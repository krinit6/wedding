<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stefana ÔÇö wedding command center</title>
<meta name="description" content="Our private wedding planning HQ ÔÇö dates, venues, quotes, tasks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --display:'Marcellus',serif; --body:'Instrument Sans',system-ui,sans-serif; --mono:'Spline Sans Mono',ui-monospace,monospace;
  --r:16px; --rc:10px;
}
/* ---- WINTER ┬Ě candlelit evergreen: christmas tree, gold, berry, blush ---- */
:root, [data-theme="winter"]{
  --bg:#152A21; --card:#1D362B; --card2:#264337; --inset:#112319;
  --wash1:rgba(223,174,84,.07); --wash2:rgba(156,44,67,.06);
  --ink:#F3EDDD; --head:#E8C377; --sub:#B9C4B4; --faint:#8FA093;
  --line:rgba(243,237,221,.10); --line2:rgba(243,237,221,.22); --frame:rgba(232,195,119,.4);
  --accent:#DFAE54; --accent-ink:#EFCB84; --accent-deep:#C08F35; --accent-soft:rgba(223,174,84,.15);
  --berry:#E6798B; --berry-soft:rgba(230,121,139,.14);
  --ever:#7FBC9B; --ever-soft:rgba(127,188,155,.14);
  --leaf:#ADBA76; --blush:#EBA9B4; --misty:#8FB4C9;
  --bulb-a:#EFC26A; --bulb-b:#E17A8A; --bulb-c:#8FCEA9; --wire:#93aa8c;
  --glow:rgba(233,190,100,.35); --shadow:5,14,10; --btn-ink:#2E2208;
}
/* ---- SPRING ┬Ě meadow & blossom: grasslands, bluebell, sweet cream, lilac, terracotta, grape fizz ---- */
[data-theme="spring"]{
  --bg:#F8F3E2; --card:#FFFEF8; --card2:#F1EBD5; --inset:#F4EFDC;
  --wash1:rgba(138,144,72,.14); --wash2:rgba(147,165,205,.14);
  --ink:#33312A; --head:#6B2540; --sub:#6A6C55; --faint:#98997F;
  --line:#E8E1C8; --line2:#D5CCA8; --frame:#C9CBA0;
  --accent:#8A9048; --accent-ink:#454A18; --accent-deep:#6F7536; --accent-soft:#EDEFD2;
  --berry:#C96A4A; --berry-soft:#F7E2D8;
  --ever:#5F7A3A; --ever-soft:#E7EED9;
  --leaf:#7E8A44; --blush:#C9A3D6; --misty:#8FA3CF;
  --bulb-a:#A9B45E; --bulb-b:#C9A3D6; --bulb-c:#93A5CD; --wire:#83875A;
  --glow:rgba(158,166,84,.42); --shadow:58,60,38; --btn-ink:#292D08;
}
/* ---- seasonal atmosphere ---- */
#season-fx{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
#season-fx .fx{position:absolute;top:-8vh;animation:fxfall var(--fd,14s) linear var(--fdel,0s) infinite}
#season-fx .fxi{display:block;animation:fxspin calc(var(--fd,14s)/2.3) linear infinite}
@keyframes fxfall{from{transform:translate3d(0,-8vh,0)}to{transform:translate3d(var(--fx,0px),108vh,0)}}
@keyframes fxspin{from{rotate:0deg}to{rotate:var(--fr,360deg)}}
#season-fx[data-t="winter"] .fxi{width:calc(6px*var(--s,1));height:calc(6px*var(--s,1));border-radius:50%;background:#fff;box-shadow:0 0 7px rgba(255,255,255,.85);opacity:.72}
#season-fx[data-t="spring"] .fxi{width:calc(11px*var(--s,1));height:calc(8.5px*var(--s,1));background:var(--blush);border-radius:62% 38% 55% 45%/58% 46% 54% 42%;opacity:.8}
#season-fx[data-t="spring"] .fx:nth-child(3n) .fxi{background:var(--misty);opacity:.6}
#season-fx[data-t="spring"] .fx:nth-child(4n) .fxi{background:var(--berry);opacity:.55}
@media (prefers-reduced-motion:reduce){#season-fx{display:none}}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;background:var(--bg)}
body{margin:0;color:var(--ink);font-family:var(--body);font-size:15.5px;line-height:1.55;-webkit-font-smoothing:antialiased;
  background:radial-gradient(700px 340px at 12% -4%,var(--wash1),transparent 70%),radial-gradient(700px 340px at 88% -4%,var(--wash2),transparent 70%),var(--bg)}
h1,h2,h3{font-family:var(--display);font-weight:400;line-height:1.15;margin:0;color:var(--head)}
h1{font-size:clamp(27px,4.2vw,36px);letter-spacing:.01em}
h2{font-size:21px} h3{font-size:17px}
p{margin:.4em 0}
a{color:var(--accent-ink);text-decoration:none} a:hover{text-decoration:underline}
button{font:inherit;color:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink);background:var(--inset);border:1px solid var(--line2);border-radius:var(--rc);padding:9px 11px;width:100%}
input::placeholder,textarea::placeholder{color:var(--faint)}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none;border-color:var(--accent-deep);box-shadow:0 0 0 3px var(--accent-soft)}
button:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent-deep);outline-offset:2px;border-radius:6px}
label{display:block;font-size:12.5px;color:var(--sub);margin:0 0 5px;letter-spacing:.02em}
::selection{background:var(--accent-soft)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.muted{color:var(--sub)} .dim{color:var(--faint)} .small{font-size:13px}
.serif{font-family:var(--display)}

/* ---------- fairy-light garland ---------- */
.garland-strip{line-height:0;overflow:hidden}
.garland{display:block;width:100%;height:46px}
.garland .wire{stroke:var(--wire);stroke-width:1.4;fill:none;opacity:.55}
.garland .pend{stroke:var(--wire);stroke-width:1;opacity:.5}
.bulb{filter:drop-shadow(0 0 2.5px currentColor) drop-shadow(0 0 7px currentColor);opacity:.95}
.bulb.a{color:var(--bulb-a)} .bulb.b{color:var(--bulb-b)} .bulb.c{color:var(--bulb-c)}
@media (prefers-reduced-motion:no-preference){
  .bulb{animation:twinkle 3s ease-in-out infinite;animation-delay:var(--d,0s)}
  @keyframes twinkle{0%,100%{opacity:.4;filter:drop-shadow(0 0 1.5px currentColor)}50%{opacity:1;filter:drop-shadow(0 0 3px currentColor) drop-shadow(0 0 9px currentColor)}}
}

/* ---------- shell ---------- */
#app{min-height:100dvh}
.shell{display:grid;grid-template-columns:96px 1fr;min-height:100dvh}
.rail{position:sticky;top:0;height:100dvh;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:18px 0;gap:4px;background:var(--card)}
.rail .brand{font-family:var(--display);font-size:15px;letter-spacing:.24em;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);color:var(--head);margin:10px 0 16px;user-select:none}
.rail .flame{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px 3px var(--glow);margin-bottom:4px}
.navbtn{display:flex;flex-direction:column;align-items:center;gap:4px;width:74px;padding:9px 0;border:0;background:none;color:var(--faint);border-radius:12px;font-size:10.5px;letter-spacing:.03em}
.navbtn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.navbtn:hover{color:var(--sub);background:var(--card2)}
.navbtn.on{color:var(--accent-ink)}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:11px;padding:11px 22px;border-bottom:1px solid var(--line);background:var(--bg)}
.topbar .who{margin-left:auto;display:flex;align-items:center;gap:9px}
.brandname{font-family:var(--display);font-size:17px;letter-spacing:.06em;color:var(--head)}
.content{padding:24px 22px 112px;max-width:1140px;width:100%;margin:0 auto}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.pagehead .sub{color:var(--sub);font-size:14px;margin-top:6px;max-width:62ch}
.tabbar{display:none}
@media (max-width:899px){
  .shell{grid-template-columns:1fr}
  .rail{display:none}
  .content{padding:18px 14px 112px}
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;gap:2px;border-top:1px solid var(--line2);background:var(--card);padding:5px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px rgba(var(--shadow),.16);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabbar::-webkit-scrollbar{display:none}
  .tabbar .navbtn{width:auto;min-width:60px;flex:1 0 auto;padding:6px 8px}
  .tabbar .navbtn svg{width:20px;height:20px}
}
@media (max-width:620px){ .brandname{display:none} .ttoggle .tt span{display:none} .topbar{padding:10px 12px;gap:8px} }

/* ---------- theme toggle ---------- */
.ttoggle{display:inline-flex;border:1px solid var(--line2);border-radius:999px;padding:2px;background:var(--card);gap:2px}
.ttoggle .tt{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;border-radius:999px;padding:4px 11px;font-size:12.5px;color:var(--sub)}
.ttoggle .tt svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ttoggle .tt.on{background:var(--accent-soft);color:var(--accent-ink)}
.ttoggle .tt:hover:not(.on){color:var(--ink)}

/* ---------- subtabs ---------- */
.subtabs{display:flex;gap:6px;margin:14px 0 18px;border-bottom:1px solid var(--line);padding-bottom:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.subtab{border:0;background:none;color:var(--faint);font-size:14px;padding:8px 12px 10px;border-bottom:2px solid transparent;white-space:nowrap}
.subtab:hover{color:var(--sub)}
.subtab.on{color:var(--accent-ink);border-bottom-color:var(--accent)}

/* ---------- venue filter bar ---------- */
.fbar{margin:12px 0 4px}
.fbar .flab{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin:9px 0 5px}
.fbar .frow{display:flex;flex-wrap:wrap;gap:7px}
.fcount{font-size:12.5px;color:var(--faint);margin:12px 0 10px}

/* ---------- primitives ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 1px 2px rgba(var(--shadow),.14),0 10px 30px rgba(var(--shadow),.10)}
.grid{display:grid;gap:14px}
.grid.cols-auto{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.row.between{justify-content:space-between}
.stack{display:flex;flex-direction:column;gap:12px}
.hr{border:0;border-top:1px solid var(--line);margin:14px 0}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--line2);border-radius:var(--rc);padding:8px 14px;font-size:14px;color:var(--ink);transition:filter .15s,border-color .15s,background .15s}
.btn:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.btn.primary{background:var(--accent);border-color:var(--accent-deep);color:var(--btn-ink);font-weight:600}
.btn.primary:hover{filter:brightness(1.06);color:var(--btn-ink)}
.btn.ghost{background:transparent;box-shadow:none}
.btn.danger{background:transparent;border-color:var(--berry);color:var(--berry)}
.btn.danger:hover{background:var(--berry-soft);color:var(--berry)}
.btn.sm{padding:5px 10px;font-size:12.5px;border-radius:8px}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.stamp{display:inline-block;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;border:1px solid var(--line2);color:var(--sub);background:transparent;border-radius:5px;padding:2.5px 7px;white-space:nowrap}
.stamp.candle{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
.stamp.olive{border-color:var(--leaf);color:var(--leaf)}
.stamp.pine{border-color:var(--ever);color:var(--ever);background:var(--ever-soft)}
.stamp.wax{border-color:var(--berry);color:var(--berry);background:var(--berry-soft)}
.stamp.misty{border-color:var(--misty);color:var(--misty)}
.stamp.solid{background:var(--accent);border-color:var(--accent-deep);color:var(--btn-ink)}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--sub);border:1px solid var(--line2);border-radius:999px;padding:4px 11px;background:var(--card)}
.chip.click{cursor:pointer}
.chip.click:hover{border-color:var(--accent);color:var(--ink)}
.chip.on{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--accent-soft);border:1px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent-ink);flex:none}
.kv{display:flex;gap:8px;font-size:13.5px}
.kv b{font-weight:500}
.empty{border:1.5px dashed var(--line2);border-radius:var(--r);padding:32px 20px;text-align:center;color:var(--sub)}
.empty .serif{font-size:19px;color:var(--head);margin-bottom:6px}
.field{margin-bottom:13px}
.fields2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fields3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media (max-width:560px){.fields2,.fields3{grid-template-columns:1fr}}
.check{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);cursor:pointer;padding:7px 0}
.check input{width:17px;height:17px;accent-color:var(--accent-deep);margin:0;flex:none}
.note{font-size:12.5px;color:var(--faint)}
.right{margin-left:auto}
.progress{height:6px;border-radius:99px;background:var(--inset);overflow:hidden;border:1px solid var(--line)}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-deep));border-radius:99px;transition:width .5s ease}
table.cmp{width:100%;border-collapse:collapse;font-size:13.5px;min-width:820px}
table.cmp th{font-weight:600;text-align:left;color:var(--sub);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:9px 10px;border-bottom:1px solid var(--line2)}
table.cmp td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
table.cmp tr:last-child td{border-bottom:0}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tick{color:var(--ever);font-weight:600} .cross{color:var(--faint)}

/* ---------- stars ---------- */
.stars{display:inline-flex;gap:2px;align-items:center}
.star{border:0;background:none;padding:2px;color:var(--line2);line-height:0}
.star svg{width:20px;height:20px;fill:currentColor;stroke:none}
.star.on{color:var(--accent)}
.star.small svg{width:14px;height:14px}
.star[disabled]{cursor:default}
.ratingbig{font-family:var(--display);font-size:26px;color:var(--head)}

/* ---------- media ---------- */
.thumb{width:58px;height:58px;border-radius:12px;object-fit:cover;flex:none;border:1px solid var(--line2);background:var(--card2)}
.thumb.ph{display:flex;align-items:center;justify-content:center;color:var(--faint)}
.thumb.ph svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px}
.gitem{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--line2);aspect-ratio:1;background:var(--card2);cursor:pointer;padding:0}
.gitem img{width:100%;height:100%;object-fit:cover;display:block}
.gitem .cov{position:absolute;left:6px;top:6px}
.gitem:hover{border-color:var(--accent)}
.frow{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:11px;background:var(--inset)}
.frow svg{width:17px;height:17px;flex:none;stroke:var(--accent-ink);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.lightbox{position:fixed;inset:0;z-index:120;background:rgba(8,14,10,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px}
.lightbox img{max-width:96vw;max-height:74dvh;border-radius:12px;box-shadow:0 20px 70px rgba(0,0,0,.5)}
.lightbox .lb-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.lightbox .lb-name{color:#F3EDDD;font-size:13px;max-width:90vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---------- vision board ---------- */
.masonry{columns:3 220px;column-gap:12px}
@media (max-width:640px){.masonry{columns:2 150px;column-gap:10px}}
.pin{display:inline-block;width:100%;vertical-align:top;break-inside:avoid;-webkit-column-break-inside:avoid;page-break-inside:avoid;margin:0 0 12px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card);box-shadow:0 1px 2px rgba(var(--shadow),.12)}
.pin.win{border-left:3px solid var(--ever)}
.pin.spr{border-left:3px solid var(--blush)}
.pin img{width:100%;height:auto;display:block;cursor:pointer}
.pin .body{padding:11px 13px}
.pin .body h4{margin:0 0 3px;font-family:var(--display);font-weight:400;font-size:16px;color:var(--head);overflow-wrap:break-word}
.pin .body p{margin:0;font-size:13px;color:var(--sub);overflow-wrap:break-word;white-space:pre-wrap}
.pin .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:999px;margin-top:8px}
.pin .tag.win{background:var(--ever-soft);color:var(--ever)}
.pin .tag.spr{background:var(--blush);color:#5e1f2e}
.pin .pinbar{display:flex;gap:6px;padding:0 13px 11px}
.swatches{display:flex;height:64px;border-radius:10px;overflow:hidden;border:1px solid var(--line2)}
.swatches span{flex:1}
.swatchrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.swatchrow .sw{width:30px;height:30px;border-radius:8px;border:1px solid var(--line2);position:relative}
.chiplabel{font-family:var(--mono);font-size:10px;color:var(--faint);text-align:center;margin-top:2px}
.seasontabs{display:inline-flex;border:1px solid var(--line2);border-radius:999px;padding:2px;background:var(--card);gap:2px}
.seasontabs button{border:0;background:transparent;border-radius:999px;padding:5px 14px;font-size:13px;color:var(--sub)}
.seasontabs button.on{background:var(--accent-soft);color:var(--accent-ink)}

/* ---------- comments ---------- */
.cthread{display:flex;flex-direction:column;gap:12px}
.cmsg{display:flex;gap:10px}
.cmsg .bubble{background:var(--inset);border:1px solid var(--line);border-radius:4px 14px 14px 14px;padding:9px 12px;font-size:14px;max-width:56ch}
.cmsg .who{font-size:11.5px;color:var(--faint);margin-bottom:3px}
.cform{display:flex;gap:8px;margin-top:14px}
.cform input{flex:1}

/* ---------- date cards ---------- */
.datecard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 14px;display:flex;flex-direction:column;gap:10px;box-shadow:0 1px 2px rgba(var(--shadow),.14),0 10px 30px rgba(var(--shadow),.10)}
.datecard .num{font-family:var(--display);font-size:46px;line-height:1;color:var(--head)}
.datecard .moy{font-size:13px;color:var(--sub);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.datecard.leading{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent),0 6px 30px var(--glow)}
.datecard.leading::after{content:"";position:absolute;inset:-2px;border-radius:var(--r);pointer-events:none;box-shadow:0 0 24px var(--glow)}
@media (prefers-reduced-motion:no-preference){
  .datecard.leading::after{animation:halo 3.2s ease-in-out infinite}
  @keyframes halo{0%,100%{opacity:.4}50%{opacity:1}}
}
.datecard.locked{border-color:var(--ever)}
.flagline{display:flex;gap:7px;align-items:flex-start;font-size:12.5px;color:var(--sub)}
.flagline .dot{margin-top:6px}
.voterow{display:flex;align-items:center;gap:6px;margin-top:2px}
.votebtns{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.vbtn{border:1px solid var(--line2);background:transparent;color:var(--sub);border-radius:8px;padding:5px 11px;font-size:12.5px}
.vbtn:hover{color:var(--ink);border-color:var(--accent)}
.vbtn.on-love{border-color:var(--accent-deep);color:var(--accent-ink);background:var(--accent-soft)}
.vbtn.on-ok{border-color:var(--line2);color:var(--ink);background:var(--card2)}
.vbtn.on-veto{border-color:var(--berry);color:var(--berry);background:var(--berry-soft)}

/* ---------- hero ---------- */
.hero{position:relative;border:1px solid var(--frame);border-radius:18px;padding:40px 28px;background:linear-gradient(180deg,var(--card) 0%,var(--card2) 140%);text-align:center;overflow:hidden;box-shadow:0 1px 2px rgba(var(--shadow),.14),0 14px 40px rgba(var(--shadow),.14)}
.hero::before{content:"";position:absolute;inset:8px;border:1px solid var(--frame);border-radius:12px;pointer-events:none;opacity:.7}
.hero .eyebrow{font-size:11.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--sub)}
.hero .big{font-family:var(--display);font-size:clamp(56px,10vw,96px);line-height:1;margin:10px 0 4px;color:var(--head)}
.hero .under{color:var(--sub);font-size:15px}
.hero .flameline{width:56px;height:1px;background:linear-gradient(90deg,transparent,var(--accent-deep),transparent);margin:16px auto 0;position:relative}
.hero .flameline::after{content:"";position:absolute;left:50%;top:-3.5px;width:7px;height:7px;transform:translateX(-50%);border-radius:50%;background:var(--accent);box-shadow:0 0 12px 4px var(--glow)}
.sprig{position:absolute;width:76px;height:76px;pointer-events:none;opacity:.9}
.sprig.tl{top:14px;left:16px}
.sprig.br{right:16px;bottom:14px;transform:rotate(180deg)}
@media (max-width:560px){.sprig{width:54px;height:54px}}

/* ---------- lists ---------- */
.vrow{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r);background:var(--card);cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:0 1px 2px rgba(var(--shadow),.12)}
.vrow:hover{border-color:var(--accent);box-shadow:0 6px 22px rgba(var(--shadow),.18)}
.vrow .name{font-family:var(--display);font-size:17.5px;color:var(--head)}
.vrow .meta{font-size:12.5px;color:var(--sub)}
.trow{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card)}
.trow.done{opacity:.55}
.trow.done .tt{text-decoration:line-through}
.trow .tt{font-size:14.5px}
.cbx{width:20px;height:20px;flex:none;margin-top:2px;border:1.5px solid var(--line2);border-radius:6px;background:transparent;display:inline-flex;align-items:center;justify-content:center;color:transparent}
.cbx:hover{border-color:var(--accent-deep)}
.cbx.on{background:var(--accent);border-color:var(--accent-deep);color:var(--btn-ink)}
.cbx svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
.sect{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sect::after{content:"";flex:1;height:1px;background:var(--line)}
.sect:first-child{margin-top:4px}
.feed{display:flex;flex-direction:column}
.feed .f{display:flex;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:13.5px;color:var(--sub)}
.feed .f:last-child{border-bottom:0}
.feed b{color:var(--ink);font-weight:500}
.availchip{cursor:pointer;user-select:none}
.availchip.free{border-color:var(--ever);color:var(--ever);background:var(--ever-soft)}
.availchip.booked{border-color:var(--berry);color:var(--berry);background:var(--berry-soft);text-decoration:line-through}

/* ---------- guests & seating & runsheet ---------- */
.grow-{display:flex;align-items:center;gap:11px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card)}
.rsvp{min-width:76px;text-align:center}
.rsvp.yes{border-color:var(--ever);color:var(--ever);background:var(--ever-soft)}
.rsvp.no{border-color:var(--berry);color:var(--berry);background:var(--berry-soft)}
.gchip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;border:1px solid var(--line2);border-radius:999px;padding:3px 10px;background:var(--inset);cursor:pointer}
.gchip:hover{border-color:var(--berry);color:var(--berry)}
.gchip.pick{cursor:pointer;background:var(--card)}
.gchip.pick:hover{border-color:var(--accent);color:var(--accent-ink)}
.gchip.sel{border-color:var(--accent-deep);background:var(--accent-soft);color:var(--accent-ink)}
.tablecard{border:1px solid var(--line2);border-radius:14px;padding:13px 14px;background:var(--card);display:flex;flex-direction:column;gap:9px}
.tablecard.target{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.tablecard .cap{font-size:12px;color:var(--faint)}
.tablecard .cap.over{color:var(--berry);font-weight:600}
.rrow{display:flex;gap:13px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);align-items:flex-start}
.rrow .rtime{font-family:var(--mono);font-size:16px;color:var(--head);min-width:56px}

/* ---------- stepper ---------- */
.stepper{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.step{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:5px 11px;border:1px solid var(--line2);border-radius:999px;color:var(--faint);cursor:pointer;background:transparent;white-space:nowrap}
.step:hover{color:var(--sub);border-color:var(--accent)}
.step.on{border-color:var(--accent-deep);color:var(--accent-ink);background:var(--accent-soft)}

/* ---------- modal & toast ---------- */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(6,12,9,.6);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;padding:0}
@media (min-width:640px){.overlay{align-items:center;padding:24px}}
.modal{background:var(--card);border:1px solid var(--frame);border-radius:18px 18px 0 0;width:100%;max-width:620px;max-height:92dvh;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.35)}
@media (min-width:640px){.modal{border-radius:18px}}
.modal>header{display:flex;align-items:center;gap:12px;padding:15px 20px;border-bottom:1px solid var(--line)}
.modal>header h3{font-size:19px}
.modal .mbody{padding:18px 20px;overflow-y:auto}
.modal>footer{display:flex;gap:10px;justify-content:flex-end;padding:13px 20px;border-top:1px solid var(--line);flex-wrap:wrap}
.xbtn{margin-left:auto;background:none;border:0;color:var(--faint);padding:6px;border-radius:8px}
.xbtn:hover{color:var(--ink)}
.xbtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
#toasts{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:max-content;max-width:92vw}
@media (min-width:900px){#toasts{bottom:26px}}
.toast{background:var(--ink);color:var(--bg);border-radius:99px;padding:9px 18px;font-size:13.5px;box-shadow:0 8px 30px rgba(0,0,0,.35);animation:tin .25s ease;text-align:center}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- auth ---------- */
.authwrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 22px 22px;background:radial-gradient(90% 60% at 50% 0%,var(--card2) 0%,var(--bg) 65%)}
.auth-garland{width:100%;max-width:860px;margin-bottom:22px}
.authcard{position:relative;width:100%;max-width:400px;background:var(--card);border:1px solid var(--frame);border-radius:18px;padding:32px 26px;text-align:center;box-shadow:0 1px 2px rgba(var(--shadow),.2),0 18px 50px rgba(var(--shadow),.22)}
.authcard::before{content:"";position:absolute;inset:7px;border:1px solid var(--frame);border-radius:12px;pointer-events:none;opacity:.7}
.authcard>*{position:relative}
.authcard .brandline{font-family:var(--display);letter-spacing:.3em;text-transform:uppercase;font-size:13px;color:var(--accent-ink)}
.authcard h1{margin:8px 0 2px}
.ordiv{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:12px;margin:14px 0}
.ordiv::before,.ordiv::after{content:"";flex:1;height:1px;background:var(--line2)}
.demo-banner{background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent-ink);border-radius:11px;padding:9px 14px;font-size:13px;display:flex;gap:9px;align-items:center;justify-content:center;flex-wrap:wrap;margin:0 22px}
@media (max-width:899px){.demo-banner{margin:0 12px}}
.errline{color:var(--berry);font-size:13px;min-height:18px;margin-top:8px}
</style>

/* ---------- fairy lights & sprigs ---------- */
function garlandSVG(){
  const swagW = 240, swags = 6, sag = 46, topY = 10, cls = ["a","b","c"];
  let wire = `M0,${topY}`, bulbs = "", n = 0;
  for (let s = 0; s < swags; s++){
    const x0 = s * swagW;
    wire += ` Q${x0 + swagW/2},${sag} ${x0 + swagW},${topY}`;
    for (let k = 1; k <= 4; k++){
      const t = k/5, x = x0 + t*swagW;
      const y = (1-t)*(1-t)*topY + 2*(1-t)*t*sag + t*t*topY;
      const d = ((n*7) % 10) / 3.5;
      bulbs += `<line class="pend" x1="${x}" y1="${y.toFixed(1)}" x2="${x}" y2="${(y+5).toFixed(1)}"/>`
             + `<circle class="bulb ${cls[n%3]}" style="--d:${d.toFixed(2)}s" cx="${x}" cy="${(y+8.5).toFixed(1)}" r="3.1" fill="currentColor"/>`;
      n++;
    }
  }
  return `<svg class="garland" viewBox="0 0 1440 56" preserveAspectRatio="xMidYMin slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="wire" d="${wire}"/>${bulbs}</svg>`;
}
function sprigs(){
  const pine = `<svg class="sprig tl" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g fill="none" stroke="var(--ever)" stroke-width="1.7" stroke-linecap="round"><path d="M10 70 C 26 52 42 38 66 12"/>${[[18,61],[26,53],[34,46],[42,39],[50,31],[57,24]].map(([x,y]) => `<path d="M${x} ${y} l-9 3 M${x} ${y} l-3 9"/>`).join("")}</g><g fill="var(--berry)"><circle cx="19" cy="68" r="3.4"/><circle cx="27" cy="71" r="2.7"/><circle cx="13" cy="74" r="2.2"/></g><circle cx="66" cy="12" r="2.2" fill="var(--accent)"/></svg>`;
  const flower = (cx,cy,r) => { const pts = [[0,-1],[.95,-.31],[.59,.81],[-.59,.81],[-.95,-.31]];
    return `<g>${pts.map(([px,py]) => `<circle cx="${(cx+px*r*1.65).toFixed(1)}" cy="${(cy+py*r*1.65).toFixed(1)}" r="${r}" fill="var(--blush)"/>`).join("")}<circle cx="${cx}" cy="${cy}" r="${(r*.72).toFixed(1)}" fill="var(--accent)"/></g>`; };
  const bloom = `<svg class="sprig tl" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 70 C 28 54 40 40 60 16" fill="none" stroke="var(--leaf)" stroke-width="1.7" stroke-linecap="round"/><path d="M30 50 q-11 -1 -14 -12 q11 1 14 12z" fill="var(--leaf)"/><path d="M40 39 q3 -11 14 -13 q-3 11 -14 13z" fill="var(--leaf)"/>${flower(60,16,3.4)}${flower(44,33,2.8)}${flower(22,58,2.3)}</svg>`;
  const s = curTheme() === "winter" ? pine : bloom;
  return s + s.replace('class="sprig tl"', 'class="sprig br"');
}

function demoAdapter(){
  const clone = o => JSON.parse(JSON.stringify(o));
  return {
    kind:"demo",
    async start(){
      ["members","dates","venues","vendors","tasks","guests","tables","runsheet","comments","files","filechunks","budget","board","activity"]
        .forEach(c => state[c] = clone(SEED[c] || []));
      state.meta = clone(SEED.meta); state.publicInfo = clone(SEED.publicInfo);
      state.booted = true; scheduleRender();
    },
    upsert(col, obj){ const arr = state[col]; const i = arr.findIndex(x => x.id === obj.id);
      if (i >= 0) arr[i] = obj; else arr.push(obj); scheduleRender(); },
    remove(col, id){ state[col] = state[col].filter(x => x.id !== id); scheduleRender(); },
    setMeta(patch){ Object.assign(state.meta, patch); scheduleRender(); },
    setPublic(patch){ Object.assign(state.publicInfo, patch); scheduleRender(); },
    watchOwner(){},
    async loadChunks(fileId, n){ let out = "";
      for (let i = 0; i < n; i++){ const c = state.filechunks.find(x => x.id === fileId + "_" + i); out += c ? c.data : ""; }
      return out; },
    addActivity(e){ state.activityAll = (state.activityAll || []).concat(e); state.activity.unshift(e); state.activity = state.activity.slice(0, 20); scheduleRender(); },
    async fetchActivity(){ return [...(state.activityAll || state.activity)].sort((a, b) => a.ts - b.ts); },
    async purgeOwner(oid){
      state.files.filter(f => (f.ownerId||f.venueId) === oid).forEach(f => {
        for (let i = 0; i < (f.chunks||0); i++) this.remove("filechunks", f.id + "_" + i);
        this.remove("files", f.id);
      });
      state.comments.filter(c => (c.ownerId||c.venueId) === oid).forEach(c => this.remove("comments", c.id));
    },
    async seedAll(){}, signOut(){}
  };
}

/* ---------- firebase adapter ---------- */
async function firebaseAdapter(cfg){
  const appM  = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js");
  const authM = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js");
  const fsM   = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js");
  const app  = appM.initializeApp(cfg);
  const auth = authM.getAuth(app);
  const db   = fsM.getFirestore(app);
  const COLS = ["members","dates","venues","vendors","tasks","guests","tables","runsheet","budget","board"];
  let unsubs = [];

  function attach(){
    detach();
    COLS.forEach(c => {
      unsubs.push(fsM.onSnapshot(fsM.collection(db, c), snap => {
        state[c] = snap.docs.map(d => ({id:d.id, ...d.data()}));
        if (c === "members") syncCurrentMember();
        state.fbEmpty = COLS.every(k => (state[k] || []).length === 0) && state.members.length === 0;
        state.booted = true; scheduleRender();
      }, err => {
        if (err.code === "permission-denied"){ state.permDenied = true; state.booted = true; scheduleRender(); }
        else toast("Firestore error: " + err.code);
      }));
    });
    unsubs.push(fsM.onSnapshot(fsM.doc(db, "public", "info"), d => {
      if (d.exists()) state.publicInfo = d.data();
      scheduleRender();
    }, () => {}));
    unsubs.push(fsM.onSnapshot(fsM.doc(db, "meta", "main"), d => {
      if (d.exists()) Object.assign(state.meta, d.data());
      syncCurrentMember(); // memberEmails live in meta ÔÇö re-map once it arrives (fixes the reload-as-Bride bug)
      scheduleRender();
    }));
    unsubs.push(fsM.onSnapshot(
      fsM.query(fsM.collection(db, "activity"), fsM.orderBy("ts","desc"), fsM.limit(20)),
      snap => { state.activity = snap.docs.map(d => ({id:d.id, ...d.data()})); scheduleRender(); }
    ));
  }
  function detach(){ unsubs.forEach(u => u()); unsubs = []; stopExtras(); }
  let extraUnsubs = [], watchedOwner = null;
  function stopExtras(){ extraUnsubs.forEach(u => u()); extraUnsubs = []; watchedOwner = null; }
  function watchOwner(oid){
    if (watchedOwner === oid) return;
    stopExtras();
    if (!oid){ state.files = []; state.comments = []; return; }
    watchedOwner = oid;
    // ownerId is the field going forward; older docs used venueId, so query both and merge.
    const merge = (target, docs) => {
      const map = {}; docs.forEach(d => { map[d.id] = {id:d.id, ...d.data()}; });
      state[target] = Object.values(map); scheduleRender();
    };
    let fO = [], fV = [], cO = [], cV = [];
    extraUnsubs.push(fsM.onSnapshot(fsM.query(fsM.collection(db, "files"), fsM.where("ownerId", "==", oid)),
      s => { fO = s.docs; merge("files", [...fO, ...fV]); }, () => {}));
    extraUnsubs.push(fsM.onSnapshot(fsM.query(fsM.collection(db, "files"), fsM.where("venueId", "==", oid)),
      s => { fV = s.docs; merge("files", [...fO, ...fV]); }, () => {}));
    extraUnsubs.push(fsM.onSnapshot(fsM.query(fsM.collection(db, "comments"), fsM.where("ownerId", "==", oid)),
      s => { cO = s.docs; merge("comments", [...cO, ...cV]); }, () => {}));
    extraUnsubs.push(fsM.onSnapshot(fsM.query(fsM.collection(db, "comments"), fsM.where("venueId", "==", oid)),
      s => { cV = s.docs; merge("comments", [...cO, ...cV]); }, () => {}));
  }
  function syncCurrentMember(){
    const email = (state.user?.email || "").toLowerCase();
    const map = state.meta.memberEmails || {};
    const hit = Object.entries(map).find(([mid, em]) => (em||"").toLowerCase() === email);
    if (hit){ if (state.currentMemberId !== hit[0]){ state.currentMemberId = hit[0]; scheduleRender(); } rememberMember(hit[0]); }
  }

  authM.onAuthStateChanged(auth, user => {
    state.user = user;
    state.permDenied = false;
    if (user){ attach(); syncCurrentMember(); }
    else { detach(); state.booted = true; }
    scheduleRender();
  });

  return {
    kind:"firebase",
    async start(){ /* onAuthStateChanged drives everything */ },
    async signIn(email, pass){ await authM.signInWithEmailAndPassword(auth, email, pass); },
    async signInGoogle(){
      const provider = new authM.GoogleAuthProvider();
      provider.setCustomParameters({prompt:"select_account"});
      await authM.signInWithPopup(auth, provider);
    },
    signOut(){ authM.signOut(auth); },
    upsert(col, obj){ const {id, ...data} = obj;
      fsM.setDoc(fsM.doc(db, col, id), data).catch(e => toast("Save failed: " + e.code)); },
    remove(col, id){ fsM.deleteDoc(fsM.doc(db, col, id)).catch(e => toast("Delete failed: " + e.code)); },
    setMeta(patch){ fsM.setDoc(fsM.doc(db, "meta", "main"), patch, {merge:true}).catch(e => toast("Save failed: " + e.code)); },
    addActivity(e){ const {id, ...data} = e; fsM.setDoc(fsM.doc(db, "activity", id), data).catch(()=>{}); },
    async fetchActivity(){
      const qs = await fsM.getDocs(fsM.query(fsM.collection(db, "activity"), fsM.orderBy("ts", "asc")));
      return qs.docs.map(d => ({id: d.id, ...d.data()}));
    },
    setPublic(patch){ fsM.setDoc(fsM.doc(db, "public", "info"), patch, {merge:true}).catch(e => toast("Save failed: " + e.code)); },
    async purgeOwner(oid){
      const grab = async (coll, field) => { try {
        return (await fsM.getDocs(fsM.query(fsM.collection(db, coll), fsM.where(field, "==", oid)))).docs;
      } catch(e){ return []; } };
      const files = [...await grab("files","ownerId"), ...await grab("files","venueId")];
      const seen = new Set();
      for (const d of files){
        if (seen.has(d.id)) continue; seen.add(d.id);
        const nChunks = d.data().chunks || 0;
        for (let i = 0; i < nChunks; i++) fsM.deleteDoc(fsM.doc(db, "filechunks", d.id + "_" + i)).catch(()=>{});
        fsM.deleteDoc(fsM.doc(db, "files", d.id)).catch(()=>{});
      }
      const cs = [...await grab("comments","ownerId"), ...await grab("comments","venueId")];
      const seenC = new Set();
      cs.forEach(d => { if (seenC.has(d.id)) return; seenC.add(d.id);
        fsM.deleteDoc(fsM.doc(db, "comments", d.id)).catch(()=>{}); });
    },
    watchOwner,
    async loadChunks(fileId, n){
      const reads = []; for (let i = 0; i < n; i++) reads.push(fsM.getDoc(fsM.doc(db, "filechunks", fileId + "_" + i)));
      const docs = await Promise.all(reads);
      return docs.map(d => d.exists() ? d.data().data : "").join("");
    },
    async seedAll(){
      const batchWrites = [];
      const put = (col, obj) => { const {id, ...data} = obj; batchWrites.push(fsM.setDoc(fsM.doc(db, col, id), data)); };
      SEED.members.forEach(m => put("members", m));
      SEED.dates.forEach(d => put("dates", d));
      SEED.venues.forEach(v => put("venues", v));
      SEED.vendors.forEach(v => put("vendors", v));
      SEED.tasks.forEach(t => put("tasks", t));
      SEED.guests.forEach(x => put("guests", x));
      SEED.runsheet.forEach(x => put("runsheet", x));
      SEED.comments.forEach(x => put("comments", x));
      SEED.files.forEach(x => put("files", x));
      SEED.budget.forEach(x => put("budget", x));
      SEED.board.forEach(x => put("board", x));
      batchWrites.push(fsM.setDoc(fsM.doc(db, "public", "info"), SEED.publicInfo, {merge:true}));
      batchWrites.push(fsM.setDoc(fsM.doc(db, "meta", "main"), SEED.meta, {merge:true}));
      await Promise.all(batchWrites);
    }
  };
}

function dateScore(d){
  let love = 0, ok = 0, veto = 0;
  Object.values(d.votes || {}).forEach(v => { if (v==="love") love++; else if (v==="ok") ok++; else if (v==="veto") veto++; });
  return { love, ok, veto, score: love*2 + ok };
}
function leadingDate(){
  const scored = state.dates.map(d => ({d, s:dateScore(d)})).filter(x => x.s.love + x.s.ok > 0 && x.s.veto === 0);
  scored.sort((a,b) => b.s.score - a.s.score || a.d.iso.localeCompare(b.d.iso));
  return scored.length && scored[0].s.score > 0 ? scored[0].d : null;
}
function lockedDate(){ return state.dates.find(d => d.id === state.meta.lockedDateId) || null; }
function focusDate(){ return lockedDate() || leadingDate(); }

function quoteTrueTotal(q, guests){
  let t = +q.total || 0;
  if (q.inclusions?.catering === "perHead") t += (+q.inclusions.cateringPerHead || 0) * guests;
  return t;
}
const QUOTE_CONF = { estimate:{txt:"estimate", cls:"wax"}, written:{txt:"quoted in writing", cls:""}, verified:{txt:"\u2713 verified", cls:"olive"} };
const quoteConf = q => QUOTE_CONF[q && q.conf] ? q.conf : "written";
const venueVerified = v => !!v.verified || (v.quotes||[]).some(q => quoteConf(q) === "verified");
function driveEmbed(url){
  let m = /drive\.google\.com\/file\/d\/([\w-]+)/.exec(url || ""); if (m) return "https://drive.google.com/file/d/" + m[1] + "/preview";
  m = /docs\.google\.com\/(document|spreadsheets|presentation)\/d\/([\w-]+)/.exec(url || ""); if (m) return "https://docs.google.com/" + m[1] + "/d/" + m[2] + "/preview";
  m = /drive\.google\.com\/open\?id=([\w-]+)/.exec(url || ""); if (m) return "https://drive.google.com/file/d/" + m[1] + "/preview";
  if (/\.pdf(\?|#|$)/i.test(url || "")) return url;
  return null;
}
function openLinkPreview(label, url, onRemove){
  const emb = driveEmbed(url);
  const btns = [{label:"Open in a new tab", primary:true, onClick(){ window.open(url, "_blank", "noopener"); }}];
  if (onRemove && !isHelper()) btns.unshift({label:"Remove this link", onClick(m, close){ onRemove(); close(); }});
  openModal(label || "Document", emb
    ? `<iframe src="${esc(emb)}" style="width:100%;height:min(68vh,620px);border:1px solid var(--line);border-radius:12px;background:#fff"></iframe>
       <p class="note" style="margin:10px 0 0">If Drive asks for access, the file isn\u2019t shared \u2014 in Drive, set it to \u201cAnyone with the link\u201d.</p>`
    : `<p style="margin:0 0 4px;word-break:break-all">${esc(url)}</p><p class="note" style="margin:0">This link can\u2019t be embedded here \u2014 it opens in a new tab.</p>`,
    btns);
}
function bestQuote(v){
  const g = +state.meta.expectedGuests || 90;
  if (!v.quotes?.length) return null;
  return [...v.quotes].sort((a,b) => quoteTrueTotal(a,g) - quoteTrueTotal(b,g))[0];
}
function venuePrice(v){
  const bq = bestQuote(v);
  if (bq) return quoteTrueTotal(bq, +state.meta.expectedGuests || 90);
  return +v.estTotal || null;
}
function venueNudges(){
  return liveVenues().filter(v => phaseOf(v) === "research" && !(v.quotes||[]).length
    && v.lastContact && daysSince(v.lastContact) >= NUDGE_DAYS);
}
function upcomingPayments(){
  const fromBudget = state.budget.filter(b => b.dueDate && (+b.amount||0) - (+b.paid||0) > 0)
    .map(b => ({label: b.label, amount: (+b.amount||0)-(+b.paid||0), due: b.dueDate}));
  return fromBudget.sort((a,b) => a.due.localeCompare(b.due));
}
function resolveDue(t){
  if (!t.due) return {iso:null, label:"No date"};
  if (t.due.type === "abs") return {iso:t.due.date, label:fmtDate(t.due.date)};
  const ld = lockedDate();
  if (ld) return {iso:monthsBeforeDate(ld.iso, t.due.months), label:fmtDate(monthsBeforeDate(ld.iso, t.due.months))};
  return {iso:null, label:"\u2248 " + plural(t.due.months, "month") + " before the day"};
}

function seasonFX(t){
  const R = (a, b) => a + Math.random() * (b - a);
  const drop = (n, dmin, dmax) => Array.from({length: n}, () =>
    `<span class="fx" style="left:${R(0,100).toFixed(1)}%;--fd:${R(dmin,dmax).toFixed(1)}s;--fdel:${R(-dmax,0).toFixed(1)}s;--fx:${R(-46,46).toFixed(0)}px;--fr:${R(160,540).toFixed(0)}deg"><i class="fxi" style="--s:${R(.55,1.3).toFixed(2)}"></i></span>`).join("");
  if (t === "winter") return drop(16, 9, 20);
  if (t === "spring") return drop(13, 10, 22);
  return "";
}

const vFilt = {use:"", stay:"", season:"", country:"", vibe:"", price:"", pmin:"", pmax:""};
let vSearch = "";
const fold = s => (s || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
const venueHaystack = v => fold([v.name, v.region, v.country, v.style, v.pitch, v.notes, v.priceNote, v.stay,
  ...(v.quotes || []).flatMap(q => [q.label, q.notes, q.total, (q.inclusions || {}).barNote]),
  ...(v.links || []).map(l => l.label)].filter(Boolean).join(" \u00b7 "));
const PHASE_RANK = {booked:0, shortlist:1, research:2, cleanup:3};
const anyQuote = (v, test) => (v.quotes||[]).some(q => test(q.inclusions || {}));
const venueText = v => [v.pitch, v.style, v.notes, v.stay, v.priceNote, v.region].filter(Boolean).join(" ").toLowerCase();
const usesCeremony  = v => v.useCeremony  !== undefined ? !!v.useCeremony  : (anyQuote(v, i => i.ceremony)  || /ceremon/.test(venueText(v)));
const usesReception = v => v.useReception !== undefined ? !!v.useReception : (anyQuote(v, i => i.reception) || /reception|dinner|dining|banquet|lunch|feast|long-table|supper|restaurant/.test(venueText(v)));
const useBadge = v => { const c = usesCeremony(v), r = usesReception(v);
  return c && r ? "Ceremony + reception" : c ? "Ceremony" : r ? "Reception" : ""; };
const hasStay = v => !!v.sleeps || !!(v.stay||"").trim() || anyQuote(v, i => (i.accommodation||{}).included);
function venueMatches(v){
  if (vSearch.trim() && !venueHaystack(v).includes(fold(vSearch.trim()))) return false;
  if (vFilt.use === "ceremony" && !usesCeremony(v)) return false;
  if (vFilt.use === "reception" && !usesReception(v)) return false;
  if (vFilt.use === "both" && !(usesCeremony(v) && usesReception(v))) return false;
  if (vFilt.stay === "stay" && !hasStay(v)) return false;
  if (vFilt.stay === "sleeps" && !v.sleeps) return false;
  if (vFilt.season && !(v.seasons||[]).includes(vFilt.season)) return false;
  if (vFilt.country && v.country !== vFilt.country) return false;
  if (vFilt.vibe && !(v.vibes||[]).includes(vFilt.vibe)) return false;
  if (vFilt.price === "quote" && !(v.quotes||[]).some(q => quoteConf(q) !== "estimate")) return false;
  if (vFilt.price === "verified" && !venueVerified(v)) return false;
  const pmin = +vFilt.pmin || 0, pmax = +vFilt.pmax || 0;
  if (pmin || pmax){
    const p = venuePrice(v);
    if (p == null) return false;
    if (pmin && p < pmin) return false;
    if (pmax && p > pmax) return false;
  }
  return true;
}

function saveFileRecord(ownerId, kind, name, mime, dataUrl, thumb){

function loadScript(u){ return new Promise((res, rej) => { const s = document.createElement("script"); s.src = u; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }
let _driveToken = null;
async function openDrivePicker(){
  const cfg = (window.STEFANA || {}).google || {};
  if (!cfg.apiKey || !cfg.clientId) throw new Error("no-config");
  if (!(window.google && window.google.accounts)) await loadScript("https://accounts.google.com/gsi/client");
  if (!window.gapi) await loadScript("https://apis.google.com/js/api.js");
  await new Promise(res => gapi.load("picker", res));
  if (!_driveToken) _driveToken = await new Promise((res, rej) => {
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: cfg.clientId,
      scope: "https://www.googleapis.com/auth/drive.readonly",
      callback: t => (t && t.access_token) ? res(t.access_token) : rej(new Error("no-token"))
    });
    tc.requestAccessToken();
  });
  return new Promise(res => {
    new google.picker.PickerBuilder()
      .addView(new google.picker.DocsView().setIncludeFolders(true))
      .setOAuthToken(_driveToken)
      .setDeveloperKey(cfg.apiKey)
      .setCallback(d => {
        if (d.action === google.picker.Action.PICKED) res(d.docs || []);
        else if (d.action === google.picker.Action.CANCEL) res([]);
      })
      .build().setVisible(true);
  });
}

function processImage(file, maxSide, quality){
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
      const c = document.createElement("canvas");
      c.width = Math.max(1, Math.round(img.width*scale)); c.height = Math.max(1, Math.round(img.height*scale));
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(url);
      res(c.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error("read")); };
    img.src = url;
  });
}
function openLightbox(o, fileId){
  const imgs = filesOf(o.id).filter(f => f.kind === "image");
  let idx = Math.max(0, imgs.findIndex(f => f.id === fileId));
  const box = document.createElement("div");
  box.className = "lightbox";
  document.getElementById("modal-root").appendChild(box);
  const close = () => { box.remove(); document.removeEventListener("keydown", key); };
  const key = e => { if (e.key === "Escape") close(); };
  document.addEventListener("keydown", key);
  async function draw(){
    const f = imgs[idx]; if (!f) return close();
    box.innerHTML = `<div class="lb-name">${esc(f.name)} ${f.size ? "┬Ě " + fmtSize(f.size) : ""}</div>
      <img alt="${esc(f.name)}" src="${f.thumb}">
      <div class="lb-bar">
        ${imgs.length > 1 ? `<button class="btn sm" data-lb="prev">${I.back} Prev</button>` : ""}
        <button class="btn sm ${o.coverFileId===f.id?"primary":""}" data-lb="cover">${o.coverFileId===f.id?"Cover photo":"Set as cover"}</button>
        <button class="btn sm danger" data-lb="del">Delete</button>
        <button class="btn sm" data-lb="close">Close</button>
        ${imgs.length > 1 ? `<button class="btn sm" data-lb="next">Next</button>` : ""}
      </div>`;
    box.querySelectorAll("[data-lb]").forEach(b => b.addEventListener("click", async () => {
      const act = b.dataset.lb;
      if (act === "close") return close();
      if (act === "prev"){ idx = (idx - 1 + imgs.length) % imgs.length; return draw(); }
      if (act === "next"){ idx = (idx + 1) % imgs.length; return draw(); }
      if (act === "cover"){ o.coverFileId = f.id; o.coverThumb = f.thumb; saveDoc(ownerColl(o), o); toast("Cover photo set"); return draw(); }
      if (act === "del"){ if (await confirmDlg(`Delete <b>${esc(f.name)}</b>?`)){ deleteFile(o, f); close(); } }
    }));
    box.addEventListener("click", e => { if (e.target === box) close(); }, {once:true});
    if (f.chunks){ try { const full = await loadFileDataUrl(f); const im = box.querySelector("img"); if (im) im.src = full; } catch(e){} }
  }
  draw();
}
async function openPdf(f){
  if (f.sample) return toast("This one is a sample placeholder ÔÇö attach a real PDF to try it.");
  try {
    const dataUrl = await loadFileDataUrl(f);
    const bin = atob(dataUrl.slice(dataUrl.indexOf(",") + 1));
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([bytes], {type: f.mime || "application/pdf"}));
    window.open(url, "_blank");
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  } catch(e){ toast("Could not open the file"); }
}

function wireVenue(id, root){
  const v = state.venues.find(x => x.id === id);
  const blocked = !v || (isHelper() && (v.deleted || (phaseOf(v) !== "shortlist" && phaseOf(v) !== "booked")));
  if (blocked){ const b = $('[data-act="back"]', root); if (b) b.addEventListener("click", () => go("#/venues")); return; }
  $('[data-act="back"]', root).addEventListener("click", () => go("#/venues"));
  const ed = $('[data-act="edit-venue"]', root);
  if (ed) ed.addEventListener("click", () => openVenueModal(v));
  const del = $('[data-act="del-venue"]', root);
  if (del) del.addEventListener("click", async () => {
    if (await confirmDlg(`Move <b>${esc(v.name)}</b> to the venue graveyard? Its quotes, photos and notes travel with it ÔÇö you can restore it any time.`)){
      v.deleted = true; v.deletedAt = Date.now(); saveDoc("venues", v);
      logActivity(`moved ÔÇť${v.name}ÔÇŁ to the graveyard`); toast("Laid to rest ÔÇö find it under the Graveyard chip"); go("#/venues"); } });
  const rst = $('[data-act="restore-venue"]', root);
  if (rst) rst.addEventListener("click", () => {
    v.deleted = false; delete v.deletedAt; saveDoc("venues", v);
    logActivity(`brought ÔÇť${v.name}ÔÇŁ back from the graveyard`); toast(`${v.name} is back`); });
  const df = $('[data-act="del-forever"]', root);
  if (df) df.addEventListener("click", async () => {
    if (await confirmDlg(`Delete <b>${esc(v.name)}</b> forever ÔÇö quotes, photos and notes too? This really can't be undone.`)){
      await adapter.purgeOwner(v.id);
      dropDoc("venues", v.id); logActivity(`deleted ÔÇť${v.name}ÔÇŁ for good`); go("#/venues"); } });
  const lc = $('[data-act="log-contact"]', root);
  if (lc) lc.addEventListener("click", () => openFollowUp(v.id));
  const aq = $('[data-act="add-quote"]', root);
  if (aq) aq.addEventListener("click", () => openQuoteModal(v.id));
  const enq = $('[data-act="enquiry"]', root); if (enq) enq.addEventListener("click", () => openEnquiryModal(v));
  $$("[data-status]", root).forEach(b => b.addEventListener("click", () => {
    if (v.status === b.dataset.status) return;
    v.status = b.dataset.status; saveDoc("venues", v);
    logActivity(`moved ÔÇť${v.name}ÔÇŁ to ${statusLabel(v.status)}`); }));
  $$("[data-avail]", root).forEach(c => c.addEventListener("click", () => {
    v.availability = v.availability || {};
    const cur = v.availability[c.dataset.avail] || "unknown";
    const next = cur === "unknown" ? "free" : cur === "free" ? "booked" : "unknown";
    if (next === "unknown") delete v.availability[c.dataset.avail]; else v.availability[c.dataset.avail] = next;
    saveDoc("venues", v); }));
  wireRatings(v, root);
  $$("[data-open-qlink]", root).forEach(b => b.addEventListener("click", () => {
    const q = (v.quotes||[]).find(x => x.id === b.dataset.openQlink);
    if (q && q.link) openLinkPreview(q.label || "Quote", q.link);
  }));
  $$("[data-open-link]", root).forEach(b => b.addEventListener("click", () => {
    const l = (v.links||[]).find(x => x.id === b.dataset.openLink);
    if (!l) return;
    openLinkPreview(l.label || l.url, l.url, () => {
      v.links = (v.links||[]).filter(x => x.id !== l.id);
      saveDoc("venues", v);
      logActivity(`removed a link from \u201c${v.name}\u201d`);
    });
  }));
  const al = $('[data-act="add-link"]', root);
  if (al) al.addEventListener("click", () => {
    openModal("Add a link", `
      <div class="field"><label>Label</label><input id="l-label" placeholder="Brochure \u00b7 Floor plan \u00b7 Their quote PDF"></div>
      <div class="field"><label>URL</label><input id="l-url" type="url" placeholder="https://drive.google.com/file/d/\u2026"></div>
      <p class="note" style="margin:6px 0 0">Drive links preview inside the app when the file is shared with \u201cAnyone with the link\u201d.</p>`,
      [{label:"Add link", primary:true, onClick(m, close){
        const url = $("#l-url", m).value.trim();
        if (!/^https?:\/\//i.test(url)) return toast("Paste a full URL (https://\u2026)");
        v.links = v.links || [];
        v.links.push({id:uid(), label:$("#l-label", m).value.trim(), url});
        saveDoc("venues", v);
        logActivity(`added a link to \u201c${v.name}\u201d`);
        close();
      }}]);
  });
  $$("[data-edit-quote]", root).forEach(b => b.addEventListener("click", () =>
    openQuoteModal(v.id, (v.quotes||[]).find(q => q.id === b.dataset.editQuote))));
  $$("[data-del-quote]", root).forEach(b => b.addEventListener("click", async () => {
    if (await confirmDlg("Delete this quote?")){
      v.quotes = (v.quotes||[]).filter(q => q.id !== b.dataset.delQuote);
      saveDoc("venues", v); logActivity(`deleted a quote from ÔÇť${v.name}ÔÇŁ`); } }));
  wireMediaCard(v, root);
  wireCommentsCard(v, root);
  const notes = $("#vnotes", root);
  if (notes) notes.addEventListener("change", () => { v.notes = notes.value; saveDoc("venues", v); toast("Notes saved"); });
}

function wireVendor(id, root){
  const v = state.vendors.find(x => x.id === id);
  if (!v){ const b = $('[data-act="back"]', root); if (b) b.addEventListener("click", () => go("#/vendors")); return; }
  $('[data-act="back"]', root).addEventListener("click", () => go("#/vendors"));
  $('[data-act="edit-vendor"]', root).addEventListener("click", () => openVendorModal(v));
  $('[data-act="del-vendor"]', root).addEventListener("click", async () => {
    if (await confirmDlg(`Delete <b>${esc(v.name)}</b>, its photos, files and notes? This can't be undone.`)){
      filesOf(v.id).forEach(f => deleteFile(v, f));
      commentsOf(v.id).forEach(c => dropDoc("comments", c.id));
      dropDoc("vendors", v.id); logActivity(`deleted vendor ÔÇť${v.name}ÔÇŁ`); go("#/vendors"); } });
  $('[data-act="log-contact"]', root).addEventListener("click", () => openVendorFollowUp(v.id));
  $('[data-act="edit-cost"]', root).addEventListener("click", () => openVendorCostModal(v));
  $$("[data-status]", root).forEach(b => b.addEventListener("click", () => {
    if (v.status === b.dataset.status) return;
    v.status = b.dataset.status; saveDoc("vendors", v);
    logActivity(`moved ÔÇť${v.name}ÔÇŁ to ${statusLabel(v.status)}`); }));
  wireRatings(v, root);
  wireMediaCard(v, root);
  wireCommentsCard(v, root);
  const notes = $("#vnotes", root);
  if (notes) notes.addEventListener("change", () => { v.notes = notes.value; saveDoc("vendors", v); toast("Notes saved"); });
}

// keep a vendor's Budget line in sync with its cost (feature: payments feed budget)
function syncVendorBudget(v){
  if (!v.cost){ return; }
  let line = state.budget.find(b => b.vendorId === v.id);
  const patch = {
    id: line ? line.id : uid(), vendorId: v.id, label: v.name, cat: budgetCatForVendor(v.cat),
    amount: +v.cost || 0, paid: v.depositPaid ? (+v.deposit || 0) : (line ? line.paid : 0),
    dueDate: v.balanceDue || "", private: line ? line.private : false, note: line ? line.note : ""
  };
  saveDoc("budget", patch);
}

    ${hasPrivate ? `<button class="chip click ${budgetShowPrivate?"on":""}" data-act="toggle-private">${budgetShowPrivate ? I.eye + " Private lines shown" : I.lock + " Private lines hidden"}</button>` : ""}
    <span class="right note">Tap any line to edit</span>
  </div>
  ${rows.length ? cats.map(catBlock).join("") : `<div class="empty"><div class="serif">No expenses yet</div>Add your first ÔÇö the venue deposit, the photographer ÔÇö and vendors you've priced show up here on their own.</div>`}`;
}

/* ============================ view: tasks ============================ */
let taskFilter = "all", showDone = false;
function taskRow(t){
  const r = resolveDue(t);
  const overdue = !t.done && r.iso && daysUntil(r.iso) < 0;
  return `<div class="trow ${t.done?"done":""}">
    <button class="cbx ${t.done?"on":""}" data-toggle-task="${t.id}" aria-label="${t.done?"Mark as not done":"Mark as done"}">${I.check}</button>
    <div style="flex:1;min-width:0">
      <div class="tt">${esc(t.title)}</div>
      <div class="note">${esc(memberName(t.assignee))} ┬Ě <span style="${overdue?"color:var(--berry)":""}">${r.label}${overdue?" ÔÇö overdue":""}</span>${t.cat?` ┬Ě ${esc(t.cat)}`:""}</div>
    </div>
    <button class="btn sm ghost" data-edit-task="${t.id}">Edit</button>
  </div>`;
}
function wireTaskRows(root){
  $$("[data-toggle-task]", root).forEach(b => b.addEventListener("click", () => {
    const t = state.tasks.find(x => x.id === b.dataset.toggleTask); if (!t) return;
    t.done = !t.done; saveDoc("tasks", t);
    if (t.done) logActivity(`ticked off ÔÇť${t.title}ÔÇŁ`);
  }));
  $$("[data-edit-task]", root).forEach(b => b.addEventListener("click", () => {
    const t = state.tasks.find(x => x.id === b.dataset.editTask); if (t) openTaskModal(t);
  }));
}
function viewTasks(){
  const ld = lockedDate();
  const chips = [`<button class="chip click ${taskFilter==="all"?"on":""}" data-tf="all">Everyone</button>`]
    .concat(state.members.map(m => `<button class="chip click ${taskFilter===m.id?"on":""}" data-tf="${m.id}">${esc(m.name)}</button>`)).join("");
  const mine = state.tasks.filter(t => taskFilter === "all" || t.assignee === taskFilter);
  const undone = mine.filter(t => !t.done);
  const doneList = mine.filter(t => t.done);
  const withIso = [], waiting = [], someday = [];
  undone.forEach(t => { const r = resolveDue(t);
    if (r.iso) withIso.push({t, iso:r.iso});
    else if (t.due && t.due.type === "rel") waiting.push(t);
    else someday.push(t); });
  withIso.sort((a,b) => a.iso.localeCompare(b.iso));
  const overdue = withIso.filter(x => daysUntil(x.iso) < 0).map(x => x.t);
  const week    = withIso.filter(x => { const d = daysUntil(x.iso); return d >= 0 && d <= 7; }).map(x => x.t);
  const later   = withIso.filter(x => daysUntil(x.iso) > 7).map(x => x.t);
  waiting.sort((a,b) => (b.due.months||0) - (a.due.months||0));
  const sec = (label, arr) => arr.length ? `<div class="sect">${label} ┬Ě ${arr.length}</div><div class="stack">${arr.map(taskRow).join("")}</div>` : "";
  return `
  <div class="pagehead">
    <div><h1>Tasks</h1><div class="sub">Who is doing what, and by when. ${ld ? "ÔÇťMonths beforeÔÇŁ deadlines are anchored to your locked date." : "ÔÇťMonths beforeÔÇŁ deadlines become real dates the moment you lock a date."}</div></div>
    <button class="btn primary" data-act="add-task">${I.plus} Add task</button>
  </div>
  ${subtabsHTML("tasks", [["","To-dos"],["day","The big day"]], "")}
  <div class="row" style="margin:0 0 4px">${chips}
    <button class="chip click right ${showDone?"on":""}" data-tf-done>Done ┬Ě ${doneList.length}</button></div>
  ${undone.length || showDone ? "" : `<div class="empty" style="margin-top:14px"><div class="serif">All clear</div>Nothing on the list${taskFilter!=="all" ? " for " + esc(memberName(taskFilter)) : ""}. Add a task, or enjoy the calm.</div>`}
  ${sec("Overdue", overdue)}
  ${sec("This week", week)}
  ${sec("Coming up", later)}
  ${sec("Waiting for the date", waiting)}
  ${sec("Someday", someday)}
  ${showDone ? sec("Done", doneList) : ""}`;
}
function wireTasks(root){
  $$("[data-tf]", root).forEach(c => c.addEventListener("click", () => { taskFilter = c.dataset.tf; scheduleRender(); }));
  const dn = $("[data-tf-done]", root); if (dn) dn.addEventListener("click", () => { showDone = !showDone; scheduleRender(); });
  const add = $('[data-act="add-task"]', root); if (add) add.addEventListener("click", () => openTaskModal());
  wireTaskRows(root);
}

function wireSeating(root){
  $$("[data-sf]", root).forEach(c => c.addEventListener("click", () => { seatFilter = c.dataset.sf; scheduleRender(); }));

let boardSeason = "all";
// pull a small palette out of an image using a canvas + coarse color buckets
function extractPalette(dataUrl, k = 5){
  return new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement("canvas");
      const w = c.width = 80, h = c.height = Math.max(1, Math.round(80 * img.height / img.width));
      const ctx = c.getContext("2d"); if (!ctx) return res([]);
      let data; try { ctx.drawImage(img, 0, 0, w, h); data = ctx.getImageData(0, 0, w, h).data; } catch(e){ return res([]); }
      const buckets = {};
      for (let i = 0; i < data.length; i += 4){
        const a = data[i+3]; if (a < 125) continue;
        const r = data[i], g = data[i+1], b = data[i+2];
        // skip near-white / near-black so we get real hues
        const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
        if (mx > 244 && mn > 235) continue;
        if (mx < 22) continue;
        const key = (r >> 5) + "," + (g >> 5) + "," + (b >> 5);
        const bk = buckets[key] || (buckets[key] = {n:0, r:0, g:0, b:0});
        bk.n++; bk.r += r; bk.g += g; bk.b += b;
      }
      const top = Object.values(buckets).sort((a,b) => b.n - a.n).slice(0, k)
        .map(bk => "#" + [bk.r, bk.g, bk.b].map(x => Math.round(x/bk.n).toString(16).padStart(2,"0")).join(""));
      res(top);
    };
    img.onerror = () => res([]);
    img.src = dataUrl;
  });
}

function boardPhotoInput(){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*"; inp.style.display = "none";
  document.body.appendChild(inp);
  inp.addEventListener("change", async () => {
    const file = inp.files[0]; inp.remove();
    if (!file) return;
    toast("Reading photo & pulling coloursÔÇŽ");
    try {
      const full = await processImage(file, 1400, .8);
      const thumb = await processImage(file, 420, .72);
      const colors = await extractPalette(thumb, 5);
      const pinId = uid();
      const season = curTheme() === "winter" ? "winter" : "spring";
      // store full image via file/chunk system, keyed to this pin
      const cut = full.indexOf(",") + 1, dataStr = full.slice(cut), head = full.slice(0, cut);
      const chunks = Math.ceil(dataStr.length / CHUNK);
      const fid = uid();
      for (let i = 0; i < chunks; i++) saveDoc("filechunks", {id: fid + "_" + i, data: dataStr.slice(i*CHUNK, (i+1)*CHUNK)});
      saveDoc("files", {id: fid, ownerId: "board", pinId, venueId: "board", kind: "image", name: file.name, mime: "image/jpeg", size: Math.round(dataStr.length*3/4), chunks, head, thumb: "", ts: Date.now(), by: me().id});
      saveDoc("board", {id: pinId, season, kind: "image", thumb, colors, title: "", note: "", ts: Date.now(), by: me().id});
      logActivity("pinned a photo to the vision board");
      openPinModal(state.board.find(x => x.id === pinId) || {id:pinId, season, kind:"image", thumb, colors, title:"", note:""}, true);
    } catch(e){ toast("Couldn't read that photo"); }
  });
  inp.click();
}

        : `<p class="note" style="margin-top:10px">Demo mode ÔÇö nothing is saved. Follow <b>SETUP-GUIDE.md</b> to connect Firebase; it takes about 15 minutes.</p>`}
    </div>
  </div>`;
}
function wireSettings(root){
  const bind = (sel, fn) => { const el = $(sel, root); if (el) el.addEventListener("change", () => fn(el)); };
  bind("#s-wname",  el => { saveMeta({weddingName: el.value.trim() || "Stefana"}); toast("Saved"); });
  bind("#s-couple", el => { saveMeta({coupleNames: el.value.trim()}); toast("Saved"); });
  bind("#s-guests", el => { saveMeta({expectedGuests: Math.max(1, +el.value || 90)}); toast("Saved ÔÇö per-guest costs updated"); });
  bind("#s-cap", el => { saveMeta({budgetCap: +el.value || 0}); toast("Saved ÔÇö budget cap updated"); });
  bind("#s-reserve", el => { saveMeta({extrasReserve: Math.max(0, +el.value || 0)}); toast("Saved ÔÇö extras reserve updated"); });
  $$("[data-mname]", root).forEach(inp => inp.addEventListener("change", () => {
    const m = memberById(inp.dataset.mname); if (!m) return;
    m.name = inp.value.trim() || m.role; saveDoc("members", m); toast("Saved"); }));
  $$("[data-memail]", root).forEach(inp => inp.addEventListener("change", () => {
    const map = {...(state.meta.memberEmails || {})};
    map[inp.dataset.memail] = inp.value.trim().toLowerCase();
    saveMeta({memberEmails: map}); toast("Saved"); }));
  const un = $('[data-act="unlock"]', root);
  if (un) un.addEventListener("click", async () => {
    if (await confirmDlg("Unlock the date? ÔÇťMonths beforeÔÇŁ deadlines go back to being estimates.")){
      saveMeta({lockedDateId:null}); logActivity("unlocked the date"); toast("Date unlocked"); }});
  const impG = $('[data-act="import-guests"]', root);
  if (impG) impG.addEventListener("click", async () => {
    const norm = s => (s || "").trim().toLowerCase();
    const oldSampleNames = {g1:"Eleni P.", g2:"Nikos K.", g3:"Marina T.", g4:"Petros D.", g5:"Sofia L.", g6:"Giorgos M."};
    const dropG = state.guests.filter(g => oldSampleNames[g.id] && g.name === oldSampleNames[g.id]);
    const dropped = new Set(dropG.map(g => g.id));
    const haveId = new Set(), haveName = new Set();
    state.guests.forEach(g => { if (!dropped.has(g.id)){ haveId.add(g.id); haveName.add(norm(g.name)); } });
    const missing = SEED.guests.filter(g => !haveId.has(g.id) && !haveName.has(norm(g.name)));
    if (!missing.length) return toast("Every guest on the master list is already in");
    if (!await confirmDlg(`Add <b>${missing.length} guest ${missing.length === 1 ? "party" : "parties"}</b> from the master list? Everyone already in the database stays exactly as they are.`)) return;
    dropG.forEach(g => dropDoc("guests", g.id));
    missing.forEach(g => saveDoc("guests", g));
    logActivity(`added ${missing.length} guest ${missing.length === 1 ? "party" : "parties"} from the master list`);
    toast(`Added ${missing.length} guest ${missing.length === 1 ? "party" : "parties"}`);
  });
  const impV = $('[data-act="import-venues"]', root);
  if (impV) impV.addEventListener("click", async () => {
    const norm = s => (s || "").trim().toLowerCase();
    const haveId = new Set(state.venues.filter(v => !v.sample).map(v => v.id));
    const haveName = new Set(state.venues.filter(v => !v.sample).map(v => norm(v.name)));
    const missing = SEED.venues.filter(v => !haveId.has(v.id) && !haveName.has(norm(v.name)));
    if (!missing.length) return toast("Every venue on the master list is already in");
    const preview = missing.slice(0, 6).map(v => esc(v.name)).join(", ") + (missing.length > 6 ? ` +${missing.length - 6} more` : "");
    if (!await confirmDlg(`Add <b>${missing.length} venue${missing.length === 1 ? "" : "s"}</b> from the master list?<br><span class="small" style="color:var(--faint)">${preview}</span><br>Note: this can bring back venues you once deleted <i>forever</i>. Living and graveyarded venues are left untouched; untouched sample venues are cleared.`)) return;
    state.venues.filter(v => v.sample).forEach(v => dropDoc("venues", v.id));
    missing.forEach(v => saveDoc("venues", v));
    logActivity(`added ${missing.length} venue${missing.length === 1 ? "" : "s"} from the master list`);
    toast(`Added ${missing.length} venue${missing.length === 1 ? "" : "s"}`);
  });
  const rb = $('[data-act="rebury"]', root);
  if (rb) rb.addEventListener("click", async () => {
    rb.disabled = true;
    let evts = [];
    try { evts = await (adapter.fetchActivity ? adapter.fetchActivity() : Promise.resolve([])); }
    catch(e){ rb.disabled = false; return toast("Could not read the activity history: " + (e.code || e.message)); }
    rb.disabled = false;
    const norm = s => (s || "").trim().toLowerCase();
    const PATS = [
      [/^deleted venue \u201c(.+)\u201d$/, true],
      [/^moved \u201c(.+)\u201d to the graveyard$/, true],
      [/^deleted \u201c(.+)\u201d for good$/, true],
      [/^brought \u201c(.+)\u201d back from the graveyard$/, false],
      [/^added venue \u201c(.+)\u201d$/, false],
      [/^updated \u201c(.+)\u201d$/, false]
    ];
    const last = new Map();
    evts.sort((a, b) => (a.ts||0) - (b.ts||0)).forEach(e => {
      for (const [rx, dead] of PATS){ const m = rx.exec(e.text || ""); if (m){ last.set(norm(m[1]), {dead, ts: e.ts}); break; } }
    });
    const targets = state.venues.filter(v => !v.deleted && !v.sample && last.get(norm(v.name)) && last.get(norm(v.name)).dead);
    if (!targets.length) return toast("Nothing to re-bury \u2014 no living venue has a deletion as its last recorded event");
    const names = targets.map(v => esc(v.name)).join(", ");
    if (!await confirmDlg(`Move <b>${targets.length} venue${targets.length === 1 ? "" : "s"}</b> back to the graveyard?<br><div class="small" style="color:var(--faint);max-height:130px;overflow:auto;margin-top:6px">${names}</div>`)) return;
    targets.forEach(v => saveDoc("venues", {...v, deleted: true, deletedAt: (last.get(norm(v.name)).ts || Date.now())}));
    logActivity(`re-buried ${targets.length} venue${targets.length === 1 ? "" : "s"} from the activity history`);
    toast(`${targets.length} venue${targets.length === 1 ? "" : "s"} laid back to rest \u2014 review them under the Graveyard chip`);
  });
  const ex = $('[data-act="export"]', root);
  if (ex) ex.addEventListener("click", () => {
    const blob = new Blob([JSON.stringify({members:state.members, dates:state.dates, venues:state.venues, vendors:state.vendors, tasks:state.tasks, guests:state.guests, tables:state.tables, runsheet:state.runsheet, budget:state.budget, board:state.board, publicInfo:state.publicInfo, meta:state.meta, activity:state.activity}, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `stefana-backup-${todayISO()}.json`;
    a.click(); URL.revokeObjectURL(a.href); toast("Backup downloaded");
  });
}

/* ============================ modal, confirm, toast ============================ */
function openModal(title, body, buttons = [], onMount, onClose){
  const host = $("#modal-root");
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="modal" role="dialog" aria-modal="true">
    <header><h3>${title}</h3><button class="xbtn" data-close aria-label="Close">${I.x}</button></header>
    <div class="mbody">${body}</div>
    ${buttons.length ? `<footer>${buttons.map((b,i) =>
      `<button class="btn ${b.primary?"primary":b.danger?"danger":""}" data-mbtn="${i}">${esc(b.label)}</button>`).join("")}</footer>` : ""}
  </div>`;
  let closed = false;
  const close = () => { if (closed) return; closed = true;
    ov.remove(); document.removeEventListener("keydown", onKey); if (onClose) onClose(); };
  const onKey = e => { if (e.key === "Escape") close(); };
  ov.addEventListener("click", e => { if (e.target === ov) close(); });
  ov.querySelector("[data-close]").addEventListener("click", close);
  buttons.forEach((b,i) => ov.querySelector(`[data-mbtn="${i}"]`).addEventListener("click", () => b.onClick(ov, close)));
  document.addEventListener("keydown", onKey);
  host.appendChild(ov);
  const first = ov.querySelector("input,select,textarea"); if (first) first.focus();
  if (onMount) onMount(ov);
  return {el:ov, close};
}
function confirmDlg(msgHTML){
  return new Promise(res => {
    let settled = false;
    const settle = val => { if (!settled){ settled = true; res(val); } };
    openModal("Are you sure?", `<p style="margin:0">${msgHTML}</p>`,
      [{label:"Cancel", onClick(m, close){ close(); }},
       {label:"Yes, do it", primary:true, onClick(m, close){ settle(true); close(); }}],
      null, () => settle(false));
  });
}
function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  $("#toasts").appendChild(t);
  setTimeout(() => { t.style.transition = "opacity .3s"; t.style.opacity = "0"; }, 2300);
  setTimeout(() => t.remove(), 2700);
}

/* ============================ dispatch & boot ============================ */
function wireView(page, id, root){
  if (page === "dates") wireDates(root);
  else if (page === "venues"){ if (id === "compare") wireCompare(root); else if (id) wireVenue(id, root); else wireVenues(root); }
  else if (page === "vendors"){ if (id) wireVendor(id, root); else wireVendors(root); }
  else if (page === "guests"){ if (id === "seating") wireSeating(root); else if (id === "page") wireGuestPage(root); else wireGuests(root); }
  else if (page === "budget") wireBudget(root);
  else if (page === "board") wireBoard(root);
  else if (page === "tasks"){ if (id === "day") wireDay(root); else wireTasks(root); }
  else if (page === "settings") wireSettings(root);
  else wireHome(root);
  $$("[data-subtab]", root).forEach(b => b.addEventListener("click", () => go("#/" + b.dataset.subtab)));
}

(function boot(){
  const cfg = window.STEFANA && window.STEFANA.firebase;
  document.title = (window.STEFANA.appName || "Stefana") + " ÔÇö wedding command center";
  if (cfg && cfg.apiKey){
    state.mode = "firebase";
    firebaseAdapter(cfg).then(a => { adapter = a; a.start(); })
      .catch(err => { console.error(err);
        state.mode = "demo"; adapter = demoAdapter(); adapter.start();
        toast("Firebase failed to load ÔÇö running in demo mode. Check your config."); });
  } else {
    adapter = demoAdapter(); adapter.start();
  }
  scheduleRender();
})();
</script>
