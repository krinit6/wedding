<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stefana — wedding command center</title>
<meta name="description" content="Our private wedding planning HQ — dates, venues, quotes, tasks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --display:'Marcellus',serif; --body:'Instrument Sans',system-ui,sans-serif; --mono:'Spline Sans Mono',ui-monospace,monospace;
  --r:16px; --rc:10px;
}
/* ---- WINTER · gold, berry, blush, pine & christmas tree on ivory ---- */
:root, [data-theme="winter"]{
  --bg:#FAF5EB; --card:#FFFDF8; --card2:#F3EADA; --inset:#F7F0E2;
  --ink:#3D2B31; --head:#71283B; --sub:#7E5F63; --faint:#93796C;
  --line:#ECDFCE; --line2:#DCC7AE; --frame:#E5D2B8;
  --accent:#D9A83F; --accent-ink:#8A6114; --accent-deep:#B98A2C; --accent-soft:#F5E7C6;
  --berry:#9C2C43; --berry-soft:#F6E1E5;
  --ever:#2E5C46; --ever-soft:#E0EDE4;
  --leaf:#5E6B34; --blush:#E2A0AB;
  --bulb-a:#E9B95C; --bulb-b:#C74B60; --bulb-c:#5F9377; --wire:#7C5B47;
  --glow:rgba(224,169,74,.4); --shadow:38,26,22;
}
/* ---- SPRING · golden hour, peach, copper, moss & bluebell on sweet cream ---- */
[data-theme="spring"]{
  --bg:#FBF4E3; --card:#FFFEF8; --card2:#F5EBD5; --inset:#F8F1DF;
  --ink:#40331F; --head:#A34A24; --sub:#7F6C55; --faint:#97815F;
  --line:#EFE3CA; --line2:#DFCBA5; --frame:#E9D8B4;
  --accent:#E2A94E; --accent-ink:#A16A17; --accent-deep:#C88A33; --accent-soft:#F8ECCB;
  --berry:#8F4568; --berry-soft:#F4E3EC;
  --ever:#75803E; --ever-soft:#EBEEDA;
  --leaf:#666D3B; --blush:#EFA184;
  --bulb-a:#ECB25B; --bulb-b:#EE9A70; --bulb-c:#8CA7CE; --wire:#8A7147;
  --glow:rgba(226,169,78,.42); --shadow:60,42,20;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;background:var(--bg)}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15.5px;line-height:1.55;-webkit-font-smoothing:antialiased;transition:background .3s}
h1,h2,h3{font-family:var(--display);font-weight:400;line-height:1.15;margin:0;color:var(--head)}
h1{font-size:clamp(26px,4vw,34px);letter-spacing:.01em}
h2{font-size:21px}
h3{font-size:17px}
p{margin:.4em 0}
a{color:var(--accent-ink);text-decoration:none}
a:hover{text-decoration:underline}
button{font:inherit;color:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink);background:var(--inset);border:1px solid var(--line2);border-radius:var(--rc);padding:9px 11px;width:100%}
input::placeholder,textarea::placeholder{color:var(--faint)}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none;border-color:var(--accent-deep);box-shadow:0 0 0 3px var(--accent-soft)}
button:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent-deep);outline-offset:2px;border-radius:6px}
label{display:block;font-size:12.5px;color:var(--sub);margin:0 0 5px;letter-spacing:.02em}
::selection{background:var(--accent-soft)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.muted{color:var(--sub)} .dim{color:var(--faint)} .small{font-size:13px}
.serif{font-family:var(--display)}

/* ---------- fairy-light garland ---------- */
.garland-strip{line-height:0;background:var(--bg);border-bottom:1px solid var(--line);overflow:hidden}
.garland{display:block;width:100%;height:46px}
.garland .wire{stroke:var(--wire);stroke-width:1.4;fill:none;opacity:.65}
.garland .pend{stroke:var(--wire);stroke-width:1;opacity:.55}
.bulb{filter:drop-shadow(0 0 2.5px currentColor) drop-shadow(0 0 7px currentColor);opacity:.95}
.bulb.a{color:var(--bulb-a)} .bulb.b{color:var(--bulb-b)} .bulb.c{color:var(--bulb-c)}
@media (prefers-reduced-motion:no-preference){
  .bulb{animation:twinkle 3s ease-in-out infinite;animation-delay:var(--d,0s)}
  @keyframes twinkle{0%,100%{opacity:.45;filter:drop-shadow(0 0 1.5px currentColor)}50%{opacity:1;filter:drop-shadow(0 0 3px currentColor) drop-shadow(0 0 9px currentColor)}}
}

/* ---------- shell ---------- */
#app{min-height:100dvh}
.shell{display:grid;grid-template-columns:96px 1fr;min-height:100dvh}
.rail{position:sticky;top:0;height:100dvh;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:18px 0;gap:6px;background:var(--card)}
.rail .brand{font-family:var(--display);font-size:15px;letter-spacing:.24em;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);color:var(--head);margin:10px 0 18px;user-select:none}
.rail .flame{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px 3px var(--glow);margin-bottom:4px}
.navbtn{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;padding:10px 0;border:0;background:none;color:var(--faint);border-radius:12px;font-size:11px;letter-spacing:.03em}
.navbtn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.navbtn:hover{color:var(--sub);background:var(--card2)}
.navbtn.on{color:var(--accent-ink)}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:11px 22px;border-bottom:1px solid var(--line);background:var(--bg)}
.topbar .who{margin-left:auto;display:flex;align-items:center;gap:10px}
.brandname{font-family:var(--display);font-size:17px;letter-spacing:.06em;color:var(--head)}
.content{padding:26px 22px 110px;max-width:1120px;width:100%;margin:0 auto}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.pagehead .sub{color:var(--sub);font-size:14px;margin-top:6px;max-width:60ch}
.tabbar{display:none}
@media (max-width:899px){
  .shell{grid-template-columns:1fr}
  .rail{display:none}
  .content{padding:20px 16px 110px}
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:space-around;border-top:1px solid var(--line2);background:var(--card);padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px rgba(var(--shadow),.07)}
  .tabbar .navbtn{width:64px;padding:7px 0}
}
@media (max-width:560px){ .brandname{display:none} .ttoggle .tt span{display:none} .topbar{padding:11px 14px} }

/* ---------- theme toggle ---------- */
.ttoggle{display:inline-flex;border:1px solid var(--line2);border-radius:999px;padding:2px;background:var(--card);gap:2px}
.ttoggle .tt{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;border-radius:999px;padding:4px 11px;font-size:12.5px;color:var(--sub)}
.ttoggle .tt svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ttoggle .tt.on{background:var(--accent-soft);color:var(--accent-ink)}
.ttoggle .tt:hover:not(.on){color:var(--ink)}

/* ---------- primitives ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 1px 2px rgba(var(--shadow),.05),0 8px 26px rgba(var(--shadow),.05)}
.card.pad-lg{padding:24px}
.grid{display:grid;gap:14px}
.grid.cols-auto{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.row.between{justify-content:space-between}
.stack{display:flex;flex-direction:column;gap:12px}
.hr{border:0;border-top:1px solid var(--line);margin:14px 0}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line2);border-radius:var(--rc);padding:8px 14px;font-size:14px;color:var(--ink);transition:background .15s,border-color .15s;box-shadow:0 1px 2px rgba(var(--shadow),.06)}
.btn:hover{background:var(--accent-soft);border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent-deep);color:#3C2A08;font-weight:600}
.btn.primary:hover{background:var(--accent-deep);color:#FFF9EC}
.btn.ghost{background:transparent;box-shadow:none}
.btn.danger{background:transparent;border-color:var(--berry);color:var(--berry);box-shadow:none}
.btn.danger:hover{background:var(--berry-soft)}
.btn.sm{padding:5px 10px;font-size:12.5px;border-radius:8px}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.stamp{display:inline-block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--line2);color:var(--sub);background:var(--card);border-radius:4px;padding:2.5px 7px;white-space:nowrap}
.stamp.candle{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
.stamp.olive{border-color:var(--leaf);color:var(--leaf);background:var(--ever-soft)}
.stamp.pine{border-color:var(--ever);color:var(--ever);background:var(--ever-soft)}
.stamp.wax{border-color:var(--berry);color:var(--berry);background:var(--berry-soft)}
.stamp.solid{background:var(--accent);border-color:var(--accent-deep);color:#3C2A08}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--sub);border:1px solid var(--line2);border-radius:999px;padding:4px 11px;background:var(--card)}
.chip.click{cursor:pointer}
.chip.click:hover{border-color:var(--accent);color:var(--ink)}
.chip.on{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--accent-soft);border:1px solid var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent-ink);flex:none}
.kv{display:flex;gap:8px;font-size:13.5px}
.kv b{font-weight:500}
.empty{border:1.5px dashed var(--line2);border-radius:var(--r);padding:34px 22px;text-align:center;color:var(--sub);background:var(--card)}
.empty .serif{font-size:19px;color:var(--head);margin-bottom:6px}
.field{margin-bottom:13px}
.fields2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:520px){.fields2{grid-template-columns:1fr}}
.check{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);cursor:pointer;padding:7px 0}
.check input{width:17px;height:17px;accent-color:var(--accent-deep);margin:0;flex:none}
.note{font-size:12.5px;color:var(--faint)}
.right{margin-left:auto}
.progress{height:6px;border-radius:99px;background:var(--card2);overflow:hidden}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-deep));border-radius:99px;transition:width .5s ease}
table.cmp{width:100%;border-collapse:collapse;font-size:13.5px;min-width:760px}
table.cmp th{font-family:var(--body);font-weight:600;text-align:left;color:var(--sub);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:9px 10px;border-bottom:1px solid var(--line2)}
table.cmp td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
table.cmp tr:last-child td{border-bottom:0}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tick{color:var(--ever);font-weight:600} .cross{color:var(--faint)}

/* ---------- date cards (signature glow) ---------- */
.datecard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 14px;display:flex;flex-direction:column;gap:10px;box-shadow:0 1px 2px rgba(var(--shadow),.05),0 8px 26px rgba(var(--shadow),.05)}
.datecard .num{font-family:var(--display);font-size:46px;line-height:1;letter-spacing:.01em;color:var(--head)}
.datecard .moy{font-size:13px;color:var(--sub);letter-spacing:.14em;text-transform:uppercase;margin-top:2px}
.datecard.leading{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent),0 6px 30px var(--glow)}
.datecard.leading::after{content:"";position:absolute;inset:-2px;border-radius:var(--r);pointer-events:none;box-shadow:0 0 24px var(--glow)}
@media (prefers-reduced-motion:no-preference){
  .datecard.leading::after{animation:halo 3.2s ease-in-out infinite}
  @keyframes halo{0%,100%{opacity:.4}50%{opacity:1}}
}
.datecard.locked{border-color:var(--ever)}
.flagline{display:flex;gap:7px;align-items:flex-start;font-size:12.5px;color:var(--sub)}
.flagline .dot{margin-top:6px}
.voterow{display:flex;align-items:center;gap:6px;margin-top:2px}
.votebtns{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.vbtn{border:1px solid var(--line2);background:var(--card);color:var(--sub);border-radius:8px;padding:4px 10px;font-size:12.5px}
.vbtn:hover{color:var(--ink);border-color:var(--accent)}
.vbtn.on-love{border-color:var(--accent-deep);color:var(--accent-ink);background:var(--accent-soft)}
.vbtn.on-ok{border-color:var(--line2);color:var(--ink);background:var(--card2)}
.vbtn.on-veto{border-color:var(--berry);color:var(--berry);background:var(--berry-soft)}

/* ---------- hero: the invitation ---------- */
.hero{position:relative;border:1px solid var(--frame);border-radius:18px;padding:40px 30px;background:linear-gradient(180deg,var(--card) 0%,var(--bg) 130%);text-align:center;overflow:hidden;box-shadow:0 1px 2px rgba(var(--shadow),.05),0 10px 34px rgba(var(--shadow),.07)}
.hero::before{content:"";position:absolute;inset:8px;border:1px solid var(--frame);border-radius:12px;pointer-events:none}
.hero .eyebrow{font-size:11.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--sub)}
.hero .big{font-family:var(--display);font-size:clamp(56px,10vw,96px);line-height:1;margin:10px 0 4px;color:var(--head)}
.hero .under{color:var(--sub);font-size:15px}
.hero .flameline{width:56px;height:1px;background:linear-gradient(90deg,transparent,var(--accent-deep),transparent);margin:16px auto 0;position:relative}
.hero .flameline::after{content:"";position:absolute;left:50%;top:-3.5px;width:7px;height:7px;transform:translateX(-50%);border-radius:50%;background:var(--accent);box-shadow:0 0 12px 4px var(--glow)}
.sprig{position:absolute;width:76px;height:76px;pointer-events:none;opacity:.9}
.sprig.tl{top:14px;left:16px}
.sprig.br{right:16px;bottom:14px;transform:rotate(180deg)}
@media (max-width:560px){.sprig{width:56px;height:56px}}

/* ---------- lists ---------- */
.vrow{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);border-radius:var(--r);background:var(--card);cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:0 1px 2px rgba(var(--shadow),.05)}
.vrow:hover{border-color:var(--accent);box-shadow:0 4px 18px rgba(var(--shadow),.09)}
.vrow .name{font-family:var(--display);font-size:17.5px;color:var(--head)}
.vrow .meta{font-size:12.5px;color:var(--sub)}
.trow{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);box-shadow:0 1px 2px rgba(var(--shadow),.04)}
.trow.done{opacity:.55}
.trow.done .tt{text-decoration:line-through}
.trow .tt{font-size:14.5px}
.cbx{width:19px;height:19px;flex:none;margin-top:2px;border:1.5px solid var(--line2);border-radius:6px;background:var(--card);display:inline-flex;align-items:center;justify-content:center;color:transparent}
.cbx:hover{border-color:var(--accent-deep)}
.cbx.on{background:var(--accent);border-color:var(--accent-deep);color:#3C2A08}
.cbx svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
.sect{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sect::after{content:"";flex:1;height:1px;background:var(--line)}
.sect:first-child{margin-top:4px}
.feed{display:flex;flex-direction:column}
.feed .f{display:flex;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:13.5px;color:var(--sub)}
.feed .f:last-child{border-bottom:0}
.feed b{color:var(--ink);font-weight:500}
.availchip{cursor:pointer;user-select:none}
.availchip.free{border-color:var(--ever);color:var(--ever);background:var(--ever-soft)}
.availchip.booked{border-color:var(--berry);color:var(--berry);background:var(--berry-soft);text-decoration:line-through}

/* ---------- stepper ---------- */
.stepper{display:flex;flex-wrap:wrap;gap:6px}
.step{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border:1px solid var(--line2);border-radius:999px;color:var(--faint);cursor:pointer;background:var(--card)}
.step:hover{color:var(--sub);border-color:var(--accent)}
.step.on{border-color:var(--accent-deep);color:var(--accent-ink);background:var(--accent-soft)}

/* ---------- modal & toast ---------- */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(59,38,32,.35);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;padding:0}
@media (min-width:640px){.overlay{align-items:center;padding:24px}}
.modal{background:var(--card);border:1px solid var(--frame);border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:92dvh;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(var(--shadow),.25)}
@media (min-width:640px){.modal{border-radius:18px}}
.modal>header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal>header h3{font-size:19px}
.modal .mbody{padding:18px 20px;overflow-y:auto}
.modal>footer{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--line)}
.xbtn{margin-left:auto;background:none;border:0;color:var(--faint);padding:6px;border-radius:8px}
.xbtn:hover{color:var(--ink)}
.xbtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
#toasts{position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
@media (min-width:900px){#toasts{bottom:26px}}
.toast{background:var(--ink);border:1px solid var(--head);color:var(--bg);border-radius:99px;padding:9px 18px;font-size:13.5px;box-shadow:0 8px 30px rgba(var(--shadow),.3);animation:tin .25s ease}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- auth ---------- */
.authwrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 22px 22px;background:radial-gradient(90% 60% at 50% 0%,var(--card) 0%,var(--bg) 65%)}
.auth-garland{width:100%;max-width:860px;border-bottom:0;background:transparent;margin-bottom:22px}
.authcard{position:relative;width:100%;max-width:400px;background:var(--card);border:1px solid var(--frame);border-radius:18px;padding:32px 26px;text-align:center;box-shadow:0 1px 2px rgba(var(--shadow),.05),0 14px 44px rgba(var(--shadow),.1)}
.authcard::before{content:"";position:absolute;inset:7px;border:1px solid var(--frame);border-radius:12px;pointer-events:none}
.authcard>*{position:relative}
.authcard .brandline{font-family:var(--display);letter-spacing:.3em;text-transform:uppercase;font-size:13px;color:var(--accent-ink)}
.authcard h1{margin:8px 0 2px}
.demo-banner{background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent-ink);border-radius:11px;padding:9px 14px;font-size:13px;display:flex;gap:9px;align-items:center;justify-content:center;flex-wrap:wrap;margin:0 22px}
@media (max-width:899px){.demo-banner{margin:0 14px}}
.errline{color:var(--berry);font-size:13px;min-height:18px;margin-top:8px}
</style>
</head>
<body>
<!-- ================================================================
  STEFANA · your wedding command center
  ----------------------------------------------------------------
  HOW TO CONNECT FIREBASE (see SETUP-GUIDE.md for the full walkthrough)
  1. Create a Firebase project (free Spark plan, no credit card),
     add a Web App, and copy its config object.
  2. Paste it below, replacing `firebase: null` with your config.
  3. Until then, the app runs in Demo mode (nothing is saved).
  NOTE: the "apiKey" inside that config is NOT a paid key and NOT a
  secret. Firebase generates it for free; it only identifies your
  project and is meant to be published in this file. Total cost of
  running this app: zero.
================================================================= -->
<script>
window.STEFANA = {

function garlandSVG(){
  const swagW = 240, swags = 6, sag = 46, topY = 10, cls = ["a","b","c"];
  let wire = `M0,${topY}`, bulbs = "", n = 0;
  for (let s = 0; s < swags; s++){
    const x0 = s * swagW;
    wire += ` Q${x0 + swagW/2},${sag} ${x0 + swagW},${topY}`;
    for (let k = 1; k <= 4; k++){
      const t = k/5, x = x0 + t*swagW;
      const y = (1-t)*(1-t)*topY + 2*(1-t)*t*sag + t*t*topY;
      const d = ((n*7) % 10) / 3.5;
      bulbs += `<line class="pend" x1="${x}" y1="${y.toFixed(1)}" x2="${x}" y2="${(y+5).toFixed(1)}"/>`
             + `<circle class="bulb ${cls[n%3]}" style="--d:${d.toFixed(2)}s" cx="${x}" cy="${(y+8.5).toFixed(1)}" r="3.1" fill="currentColor"/>`;
      n++;
    }
  }
  return `<svg class="garland" viewBox="0 0 1440 56" preserveAspectRatio="xMidYMin slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="wire" d="${wire}"/>${bulbs}</svg>`;
}

/* ---------- firebase adapter ---------- */
async function firebaseAdapter(cfg){
  const appM  = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js");
  const authM = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js");
  const fsM   = await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js");
  const app  = appM.initializeApp(cfg);
  const auth = authM.getAuth(app);
  const db   = fsM.getFirestore(app);
  const COLS = ["members","dates","venues","tasks"];
  let unsubs = [];

  function attach(){
    detach();
    COLS.forEach(c => {
      unsubs.push(fsM.onSnapshot(fsM.collection(db, c), snap => {
        state[c] = snap.docs.map(d => ({id:d.id, ...d.data()}));
        if (c === "members") syncCurrentMember();
        state.fbEmpty = COLS.every(k => (state[k] || []).length === 0) && state.members.length === 0;
        state.booted = true; scheduleRender();
      }, err => {
        if (err.code === "permission-denied"){ state.permDenied = true; state.booted = true; scheduleRender(); }
        else toast("Firestore error: " + err.code);
      }));
    });
    unsubs.push(fsM.onSnapshot(fsM.doc(db, "meta", "main"), d => {
      if (d.exists()) Object.assign(state.meta, d.data());
      scheduleRender();
    }));
    unsubs.push(fsM.onSnapshot(
      fsM.query(fsM.collection(db, "activity"), fsM.orderBy("ts","desc"), fsM.limit(20)),
      snap => { state.activity = snap.docs.map(d => ({id:d.id, ...d.data()})); scheduleRender(); }
    ));
  }
  function detach(){ unsubs.forEach(u => u()); unsubs = []; }
  function syncCurrentMember(){
    const email = (state.user?.email || "").toLowerCase();
    const map = state.meta.memberEmails || {};
    const hit = Object.entries(map).find(([mid, em]) => (em||"").toLowerCase() === email);
    if (hit) state.currentMemberId = hit[0];
  }

  authM.onAuthStateChanged(auth, user => {
    state.user = user;
    state.permDenied = false;
    if (user){ attach(); syncCurrentMember(); }
    else { detach(); state.booted = true; }
    scheduleRender();
  });

  return {
    kind:"firebase",
    async start(){ /* onAuthStateChanged drives everything */ },
    async signIn(email, pass){ await authM.signInWithEmailAndPassword(auth, email, pass); },
    async signInGoogle(){ await authM.signInWithPopup(auth, new authM.GoogleAuthProvider()); },
    signOut(){ authM.signOut(auth); },
    upsert(col, obj){ const {id, ...data} = obj;
      fsM.setDoc(fsM.doc(db, col, id), data).catch(e => toast("Save failed: " + e.code)); },
    remove(col, id){ fsM.deleteDoc(fsM.doc(db, col, id)).catch(e => toast("Delete failed: " + e.code)); },
    setMeta(patch){ fsM.setDoc(fsM.doc(db, "meta", "main"), patch, {merge:true}).catch(e => toast("Save failed: " + e.code)); },
    addActivity(e){ const {id, ...data} = e; fsM.setDoc(fsM.doc(db, "activity", id), data).catch(()=>{}); },
    async seedAll(){
      const batchWrites = [];
      const put = (col, obj) => { const {id, ...data} = obj; batchWrites.push(fsM.setDoc(fsM.doc(db, col, id), data)); };
      SEED.members.forEach(m => put("members", m));
      SEED.dates.forEach(d => put("dates", d));
      SEED.venues.forEach(v => put("venues", v));
      SEED.tasks.forEach(t => put("tasks", t));
      batchWrites.push(fsM.setDoc(fsM.doc(db, "meta", "main"), SEED.meta, {merge:true}));
      await Promise.all(batchWrites);
    }
  };
}

function dateScore(d){
  let love = 0, ok = 0, veto = 0;
  Object.values(d.votes || {}).forEach(v => { if (v==="love") love++; else if (v==="ok") ok++; else if (v==="veto") veto++; });
  return { love, ok, veto, score: love*2 + ok };
}
function leadingDate(){
  const scored = state.dates.map(d => ({d, s:dateScore(d)})).filter(x => x.s.love + x.s.ok > 0 && x.s.veto === 0);
  scored.sort((a,b) => b.s.score - a.s.score || a.d.iso.localeCompare(b.d.iso));
  return scored.length && scored[0].s.score > 0 ? scored[0].d : null;
}
function lockedDate(){ return state.dates.find(d => d.id === state.meta.lockedDateId) || null; }
function focusDate(){ return lockedDate() || leadingDate(); }

function quoteTrueTotal(q, guests){
  let t = +q.total || 0;
  if (q.inclusions?.catering === "perHead") t += (+q.inclusions.cateringPerHead || 0) * guests;
  return t;
}
function bestQuote(v){
  const g = +state.meta.expectedGuests || 90;
  if (!v.quotes?.length) return null;
  return [...v.quotes].sort((a,b) => quoteTrueTotal(a,g) - quoteTrueTotal(b,g))[0];
}
function venueNudges(){
  return state.venues.filter(v => v.status === "emailed" && v.lastContact && daysSince(v.lastContact) >= NUDGE_DAYS);

function resolveDue(t){
  if (!t.due) return {iso:null, label:"No date"};
  if (t.due.type === "abs") return {iso:t.due.date, label:fmtDate(t.due.date)};
  const ld = lockedDate();
  if (ld) return {iso:monthsBeforeDate(ld.iso, t.due.months), label:fmtDate(monthsBeforeDate(ld.iso, t.due.months))};
  return {iso:null, label:"\u2248 " + plural(t.due.months, "month") + " before the day"};
}

function wireAuth(root){

    try { await adapter.signInGoogle(); }
    catch(ex){ err.textContent = ({
      "auth/popup-closed-by-user":"The Google window was closed before finishing — try again.",
      "auth/cancelled-popup-request":"",
      "auth/popup-blocked":"Your browser blocked the popup. Allow popups for this site and try again.",
      "auth/operation-not-allowed":"Google sign-in isn't switched on in Firebase yet (Authentication → Sign-in method)."
    })[ex.code] ?? ("Could not sign in (" + ex.code + ")"); }
  });
  $("#login", root).addEventListener("submit", async e => {
    e.preventDefault();
    const err = $("#autherr", root); err.textContent = "";
    try { await adapter.signIn($("#em",root).value.trim(), $("#pw",root).value); }
    catch(ex){ err.textContent = ({
      "auth/invalid-credential":"Wrong email or password.",
      "auth/user-not-found":"No account with that email.",
      "auth/wrong-password":"Wrong password.",
      "auth/too-many-requests":"Too many tries — wait a moment.",
      "auth/operation-not-allowed":"Email sign-in isn't switched on — use the Google button above."
    })[ex.code] || ("Could not sign in (" + ex.code + ")"); }
  });
}

/* ============================ view: venues ============================ */
let venueFilter = "all";
function inclusionRows(q){
  const inc = q.inclusions || {};
  const acc = inc.accommodation || {};
  const cat = inc.catering === "included" ? {ok:true, txt:"Catering included"} :
              inc.catering === "perHead"  ? {ok:true, txt:`Catering ${money(inc.cateringPerHead, q.currency)} / head`} :
                                            {ok:false, txt:"Catering not included"};
  return [
    {ok:!!inc.ceremony,  txt:"Ceremony"},
    {ok:!!inc.reception, txt:"Reception"},
    cat,
    {ok:!!inc.openBar, txt: inc.openBar ? "Open bar" : (inc.barNote ? esc(inc.barNote) : "Open bar not included")},
    {ok:!!acc.included, txt: acc.included ? `Stay: ${plural(acc.rooms||0,"room")} × ${plural(acc.nights||0,"night")}${acc.note?` — ${esc(acc.note)}`:""}` : "No accommodation"},
    {ok:!!inc.exclusiveUse, txt:"Exclusive use"},
    {ok:!!inc.planner, txt:"On-site planner"}
  ];
}
function perGuestAllIn(q){
  const g = +state.meta.expectedGuests || 90;
  return quoteTrueTotal(q, g) / g;
}

function viewVenues(){
  const counts = Object.fromEntries(STATUSES.map(s => [s.id, state.venues.filter(v => v.status === s.id).length]));
  const chips = [`<button class="chip click ${venueFilter==="all"?"on":""}" data-vf="all">All · ${state.venues.length}</button>`]
    .concat(STATUSES.filter(s => counts[s.id]).map(s =>
      `<button class="chip click ${venueFilter===s.id?"on":""}" data-vf="${s.id}">${s.label} · ${counts[s.id]}</button>`)).join("");
  const list = venueFilter === "all" ? [...state.venues] : state.venues.filter(v => v.status === venueFilter);
  const order = Object.fromEntries(STATUSES.map((s,i) => [s.id, i]));
  list.sort((a,b) => (order[a.status]??9) - (order[b.status]??9) || a.name.localeCompare(b.name));
  const fd = focusDate();

  const rows = list.map(v => {
    const bq = bestQuote(v);
    const nudge = v.status === "emailed" && v.lastContact && daysSince(v.lastContact) >= NUDGE_DAYS;
    const avail = fd ? (v.availability||{})[fd.iso] : null;
    return `<div class="vrow" data-open-venue="${v.id}">
      <div style="min-width:0;flex:1">
        <div class="row" style="gap:8px"><span class="name">${esc(v.name)}</span>
          ${v.sample ? `<span class="stamp">Sample</span>` : ""}
          ${nudge ? `<span class="dot" title="Waiting on a reply" style="background:var(--berry)"></span>` : ""}</div>
        <div class="meta">${esc(v.region || "")}${v.country ? " · " + esc(v.country) : ""}${v.capacity ? ` · up to ${v.capacity} guests` : ""}${v.style ? ` · ${esc(v.style)}` : ""}</div>
        ${avail ? `<div class="meta" style="color:${avail==="free"?"var(--ever)":"var(--berry)"}">${avail === "free" ? "Free" : "Booked"} on ${fmtDate(fd.iso)}</div>` : ""}
      </div>
      <div style="text-align:right;flex:none">
        ${bq ? `<div class="mono" style="font-size:15px">${money(quoteTrueTotal(bq, +state.meta.expectedGuests||90), bq.currency)}</div>
                <div class="note mono">${money(perGuestAllIn(bq), bq.currency)} / guest</div>`
             : `<div class="note">no quote yet</div>`}
        <div style="margin-top:5px"><span class="stamp ${v.status==="booked"?"solid":v.status==="shortlist"?"candle":v.status==="passed"?"wax":""}">${statusLabel(v.status)}</span></div>
      </div>
    </div>`;
  }).join("");

  return `
  <div class="pagehead">
    <div><h1>Venues</h1><div class="sub">Every venue, every quote, and exactly what each price includes — so you compare like with like.</div></div>
    <div class="row">
      <button class="btn" data-act="compare">${I.compare} Compare quotes</button>
      <button class="btn primary" data-act="add-venue">${I.plus} Add venue</button>
    </div>
  </div>
  <div class="row" style="margin:14px 0 16px">${chips}</div>
  ${list.length ? `<div class="stack">${rows}</div>` : `<div class="empty"><div class="serif">No venues here yet</div>Add the ones you have emailed — the pipeline does the remembering.</div>`}`;
}
function wireVenues(root){
  $$("[data-vf]", root).forEach(c => c.addEventListener("click", () => { venueFilter = c.dataset.vf; scheduleRender(); }));
  $$("[data-open-venue]", root).forEach(r => r.addEventListener("click", () => go("#/venues/" + r.dataset.openVenue)));

}

function wireVenue(id, root){
  const v = state.venues.find(x => x.id === id); if (!v) {
    const b = $('[data-act="back"]', root); if (b) b.addEventListener("click", () => go("#/venues")); return; }
  $('[data-act="back"]', root).addEventListener("click", () => go("#/venues"));
  $('[data-act="edit-venue"]', root).addEventListener("click", () => openVenueModal(v));
  $('[data-act="del-venue"]', root).addEventListener("click", async () => {
    if (await confirmDlg(`Delete <b>${esc(v.name)}</b> and its quotes? This can’t be undone.`)){
      dropDoc("venues", v.id); logActivity(`deleted venue “${v.name}”`); go("#/venues"); } });
  $('[data-act="log-contact"]', root).addEventListener("click", () => openFollowUp(v.id));
  $('[data-act="add-quote"]', root).addEventListener("click", () => openQuoteModal(v.id));
  $$("[data-status]", root).forEach(b => b.addEventListener("click", () => {
    if (v.status === b.dataset.status) return;
    v.status = b.dataset.status; saveDoc("venues", v);
    logActivity(`moved “${v.name}” to ${statusLabel(v.status)}`); }));
  $$("[data-avail]", root).forEach(c => c.addEventListener("click", () => {
    v.availability = v.availability || {};
    const cur = v.availability[c.dataset.avail] || "unknown";
    const next = cur === "unknown" ? "free" : cur === "free" ? "booked" : "unknown";
    if (next === "unknown") delete v.availability[c.dataset.avail]; else v.availability[c.dataset.avail] = next;
    saveDoc("venues", v); }));
  $$("[data-vrate]", root).forEach(b => b.addEventListener("click", () => {
    v.ratings = v.ratings || {}; const meId = me().id;
    v.ratings[meId] = v.ratings[meId] === b.dataset.vrate ? null : b.dataset.vrate;
    if (!v.ratings[meId]) delete v.ratings[meId];
    saveDoc("venues", v); }));
  $$("[data-edit-quote]", root).forEach(b => b.addEventListener("click", () =>
    openQuoteModal(v.id, (v.quotes||[]).find(q => q.id === b.dataset.editQuote))));
  $$("[data-del-quote]", root).forEach(b => b.addEventListener("click", async () => {
    if (await confirmDlg("Delete this quote?")){
      v.quotes = (v.quotes||[]).filter(q => q.id !== b.dataset.delQuote);
      saveDoc("venues", v); logActivity(`deleted a quote from “${v.name}”`); } }));
  const notes = $("#vnotes", root);
  if (notes) notes.addEventListener("change", () => { v.notes = notes.value; saveDoc("venues", v); toast("Notes saved"); });
}

      return `<tr>
        <td><a href="#/venues/${v.id}"><b>${esc(v.name)}</b></a><div class="note">${esc(v.region||"")}</div></td>
        <td class="mono">${money(quoteTrueTotal(q,g), q.currency)}</td>
        <td class="mono">${money(perGuestAllIn(q), q.currency)}</td>
        <td>${mark(inc.ceremony)}</td><td>${mark(inc.reception)}</td>

      </tr>`; }).join("")}</tbody></table></div>`

/* ============================ view: tasks ============================ */
let taskFilter = "all", showDone = false;
function taskRow(t){
  const r = resolveDue(t);
  const overdue = !t.done && r.iso && daysUntil(r.iso) < 0;
  return `<div class="trow ${t.done?"done":""}">
    <button class="cbx ${t.done?"on":""}" data-toggle-task="${t.id}" aria-label="${t.done?"Mark as not done":"Mark as done"}">${I.check}</button>
    <div style="flex:1;min-width:0">
      <div class="tt">${esc(t.title)}</div>
      <div class="note">${esc(memberName(t.assignee))} · <span style="${overdue?"color:var(--berry)":""}">${r.label}${overdue?" — overdue":""}</span>${t.cat?` · ${esc(t.cat)}`:""}</div>
    </div>
    <button class="btn sm ghost" data-edit-task="${t.id}">Edit</button>
  </div>`;
}
function wireTaskRows(root){
  $$("[data-toggle-task]", root).forEach(b => b.addEventListener("click", () => {
    const t = state.tasks.find(x => x.id === b.dataset.toggleTask); if (!t) return;
    t.done = !t.done; saveDoc("tasks", t);
    if (t.done) logActivity(`ticked off “${t.title}”`);
  }));
  $$("[data-edit-task]", root).forEach(b => b.addEventListener("click", () => {
    const t = state.tasks.find(x => x.id === b.dataset.editTask); if (t) openTaskModal(t);
  }));
}
function viewTasks(){
  const ld = lockedDate();
  const chips = [`<button class="chip click ${taskFilter==="all"?"on":""}" data-tf="all">Everyone</button>`]
    .concat(state.members.map(m => `<button class="chip click ${taskFilter===m.id?"on":""}" data-tf="${m.id}">${esc(m.name)}</button>`)).join("");
  const mine = state.tasks.filter(t => taskFilter === "all" || t.assignee === taskFilter);
  const undone = mine.filter(t => !t.done);
  const doneList = mine.filter(t => t.done);
  const withIso = [], waiting = [], someday = [];
  undone.forEach(t => { const r = resolveDue(t);
    if (r.iso) withIso.push({t, iso:r.iso});
    else if (t.due && t.due.type === "rel") waiting.push(t);
    else someday.push(t); });
  withIso.sort((a,b) => a.iso.localeCompare(b.iso));
  const overdue = withIso.filter(x => daysUntil(x.iso) < 0).map(x => x.t);
  const week    = withIso.filter(x => { const d = daysUntil(x.iso); return d >= 0 && d <= 7; }).map(x => x.t);
  const later   = withIso.filter(x => daysUntil(x.iso) > 7).map(x => x.t);
  waiting.sort((a,b) => (b.due.months||0) - (a.due.months||0));
  const sec = (label, arr) => arr.length ? `<div class="sect">${label} · ${arr.length}</div><div class="stack">${arr.map(taskRow).join("")}</div>` : "";
  return `
  <div class="pagehead">
    <div><h1>Tasks</h1><div class="sub">Who is doing what, and by when. ${ld ? "“Months before” deadlines are anchored to your locked date." : "“Months before” deadlines become real dates the moment you lock a date."}</div></div>
    <button class="btn primary" data-act="add-task">${I.plus} Add task</button>
  </div>
  <div class="row" style="margin:14px 0 4px">${chips}
    <button class="chip click right ${showDone?"on":""}" data-tf-done>Done · ${doneList.length}</button></div>
  ${undone.length || showDone ? "" : `<div class="empty" style="margin-top:14px"><div class="serif">All clear</div>Nothing on the list${taskFilter!=="all" ? " for " + esc(memberName(taskFilter)) : ""}. Add a task, or enjoy the calm.</div>`}
  ${sec("Overdue", overdue)}
  ${sec("This week", week)}
  ${sec("Coming up", later)}
  ${sec("Waiting for the date", waiting)}
  ${sec("Someday", someday)}
  ${showDone ? sec("Done", doneList) : ""}`;
}
function wireTasks(root){
  $$("[data-tf]", root).forEach(c => c.addEventListener("click", () => { taskFilter = c.dataset.tf; scheduleRender(); }));
  const dn = $("[data-tf-done]", root); if (dn) dn.addEventListener("click", () => { showDone = !showDone; scheduleRender(); });
  const add = $('[data-act="add-task"]', root); if (add) add.addEventListener("click", () => openTaskModal());
  wireTaskRows(root);
}
function openTaskModal(orig){
  const isNew = !orig;
  const t = orig ? {...orig, due: orig.due ? {...orig.due} : null}
                 : {id:uid(), title:"", cat:"Other", assignee:me().id, done:false, due:null};
  const dueType = t.due ? t.due.type : "none";
  openModal(isNew ? "Add a task" : "Edit task", `
    <div class="field"><label>What needs doing</label><input id="t-title" value="${esc(t.title)}" placeholder="Book the florist"></div>
    <div class="fields2">
      <div class="field"><label>Category</label><select id="t-cat">${TASK_CATS.map(c => `<option ${t.cat===c?"selected":""}>${c}</option>`).join("")}</select></div>
      <div class="field"><label>Whose hands</label><select id="t-who">${state.members.map(m => `<option value="${m.id}" ${t.assignee===m.id?"selected":""}>${esc(m.name)}</option>`).join("")}</select></div>
    </div>
    <div class="fields2">
      <div class="field"><label>Deadline</label><select id="t-duetype">
        <option value="none" ${dueType==="none"?"selected":""}>No deadline</option>
        <option value="abs" ${dueType==="abs"?"selected":""}>A specific date</option>
        <option value="rel" ${dueType==="rel"?"selected":""}>Months before the wedding</option></select></div>
      <div class="field" id="t-abs-wrap" style="${dueType==="abs"?"":"display:none"}"><label>Date</label><input id="t-date" type="date" value="${esc(t.due && t.due.date || "")}"></div>
      <div class="field" id="t-rel-wrap" style="${dueType==="rel"?"":"display:none"}"><label>How many months</label><input id="t-months" type="number" min="0" max="36" value="${esc(t.due && t.due.months != null ? t.due.months : "")}"></div>
    </div>
    ${!lockedDate() ? `<div class="note">No date locked yet — “months before” stays an estimate until you lock one.</div>` : ""}`,
    [ ...(isNew ? [] : [{label:"Delete", danger:true, onClick(m, close){
        dropDoc("tasks", t.id); logActivity(`deleted task “${t.title}”`); close(); }}]),
      {label: isNew ? "Add task" : "Save task", primary:true, onClick(m, close){
        const title = $("#t-title", m).value.trim(); if (!title) return toast("Give the task a name");
        const dt = $("#t-duetype", m).value;
        t.title = title; t.cat = $("#t-cat", m).value; t.assignee = $("#t-who", m).value;
        t.due = dt === "abs" ? {type:"abs", date: $("#t-date", m).value || todayISO()} :
                dt === "rel" ? {type:"rel", months: +$("#t-months", m).value || 0} : null;
        saveDoc("tasks", t);
        logActivity(isNew ? `added task “${t.title}”` : `updated task “${t.title}”`);
        close();
      }}],
    m => { $("#t-duetype", m).addEventListener("change", () => {
      const v = $("#t-duetype", m).value;
      $("#t-abs-wrap", m).style.display = v === "abs" ? "" : "none";
      $("#t-rel-wrap", m).style.display = v === "rel" ? "" : "none"; }); });
}

/* ============================ view: settings ============================ */

  const ld = lockedDate();
  const cfg = window.STEFANA.firebase;
  return `
  <div class="pagehead"><div><h1>Set-up</h1><div class="sub">Names, people, the locked date, and your data.</div></div></div>
  <div class="grid cols-2" style="margin-top:14px">
    <div class="card">
      <h3>The wedding</h3>
      <div class="field" style="margin-top:12px"><label>App name (shown everywhere)</label><input id="s-wname" value="${esc(state.meta.weddingName||"")}"></div>
      <div class="field"><label>The two of you</label><input id="s-couple" value="${esc(state.meta.coupleNames||"")}" placeholder="Maria & Nikos"></div>
      <div class="field"><label>Expected guests — drives every per-guest cost</label><input id="s-guests" type="number" min="1" value="${esc(state.meta.expectedGuests)}"></div>
      <div class="note">Changes save when you click away from a field.</div>
    </div>
    <div class="card">
      <h3>The date</h3>
      ${ld ? `<p style="margin-top:12px">Locked: <b class="serif" style="color:var(--leaf)">${fmtDateLong(ld.iso)}</b></p>
        <button class="btn danger sm" data-act="unlock">Unlock the date</button>
        <div class="note" style="margin-top:8px">Unlocking turns “months before” deadlines back into estimates.</div>`
      : `<p class="muted" style="margin-top:12px">No date locked yet. Vote on the Dates page, then lock the winner.</p>`}
      <hr class="hr">
      <h3 style="font-size:15px">Coming next</h3>
      <div class="note">Phase 2: guest list & RSVPs, budget with per-expense privacy. Phase 3: vision board, vendors, documents vault.</div>
    </div>
  </div>
  <div class="sect">The four of you</div>
  <div class="card">
    <div class="note" style="margin-bottom:12px">Names appear on votes and tasks. Emails link each login to a person — use the exact address of each Firebase account.</div>
    <div class="stack">
    ${state.members.map(m => `
      <div class="fields2" style="align-items:end">
        <div class="field" style="margin:0"><label>${esc(m.role)} — name</label><input data-mname="${m.id}" value="${esc(m.name)}"></div>
        <div class="field" style="margin:0"><label>Login email</label><input data-memail="${m.id}" type="email" value="${esc((state.meta.memberEmails||{})[m.id]||"")}" placeholder="name@example.com"></div>
      </div>`).join("")}
    </div>
  </div>
  <div class="sect">Data & connection</div>
  <div class="grid cols-2">
    <div class="card">
      <h3>Backup</h3>
      <p class="note" style="margin:10px 0 12px">Everything — venues, quotes, votes, tasks — as one JSON file. Keep one before big changes.</p>
      <button class="btn" data-act="export">Export a backup</button>
    </div>
    <div class="card">
      <h3>Connection</h3>
      ${state.mode === "firebase"
        ? `<p class="note" style="margin-top:10px">Connected to Firebase project <b class="mono">${esc(cfg && cfg.projectId || "?")}</b>${state.user ? ` as <b>${esc(state.user.email)}</b>` : ""}. Everything syncs live for all four of you.</p>`
        : `<p class="note" style="margin-top:10px">Demo mode — nothing is saved. Follow <b>SETUP-GUIDE.md</b> to connect Firebase; it takes about 15 minutes.</p>`}
    </div>
  </div>`;
}
function wireSettings(root){
  const bind = (sel, fn) => { const el = $(sel, root); if (el) el.addEventListener("change", () => fn(el)); };
  bind("#s-wname",  el => { saveMeta({weddingName: el.value.trim() || "Stefana"}); toast("Saved"); });
  bind("#s-couple", el => { saveMeta({coupleNames: el.value.trim()}); toast("Saved"); });
  bind("#s-guests", el => { saveMeta({expectedGuests: Math.max(1, +el.value || 90)}); toast("Saved — per-guest costs updated"); });
  $$("[data-mname]", root).forEach(inp => inp.addEventListener("change", () => {
    const m = memberById(inp.dataset.mname); if (!m) return;
    m.name = inp.value.trim() || m.role; saveDoc("members", m); toast("Saved"); }));
  $$("[data-memail]", root).forEach(inp => inp.addEventListener("change", () => {
    const map = {...(state.meta.memberEmails || {})};
    map[inp.dataset.memail] = inp.value.trim().toLowerCase();
    saveMeta({memberEmails: map}); toast("Saved"); }));
  const un = $('[data-act="unlock"]', root);
  if (un) un.addEventListener("click", async () => {
    if (await confirmDlg("Unlock the date? “Months before” deadlines go back to being estimates.")){
      saveMeta({lockedDateId:null}); logActivity("unlocked the date"); toast("Date unlocked"); }});
  const ex = $('[data-act="export"]', root);
  if (ex) ex.addEventListener("click", () => {
    const blob = new Blob([JSON.stringify({members:state.members, dates:state.dates, venues:state.venues, tasks:state.tasks, meta:state.meta, activity:state.activity}, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `stefana-backup-${todayISO()}.json`;
    a.click(); URL.revokeObjectURL(a.href); toast("Backup downloaded");
  });
}

/* ============================ modal, confirm, toast ============================ */
function openModal(title, body, buttons = [], onMount, onClose){
  const host = $("#modal-root");
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="modal" role="dialog" aria-modal="true">
    <header><h3>${title}</h3><button class="xbtn" data-close aria-label="Close">${I.x}</button></header>
    <div class="mbody">${body}</div>
    ${buttons.length ? `<footer>${buttons.map((b,i) =>
      `<button class="btn ${b.primary?"primary":b.danger?"danger":""}" data-mbtn="${i}">${esc(b.label)}</button>`).join("")}</footer>` : ""}
  </div>`;
  let closed = false;
  const close = () => { if (closed) return; closed = true;
    ov.remove(); document.removeEventListener("keydown", onKey); if (onClose) onClose(); };
  const onKey = e => { if (e.key === "Escape") close(); };
  ov.addEventListener("click", e => { if (e.target === ov) close(); });
  ov.querySelector("[data-close]").addEventListener("click", close);
  buttons.forEach((b,i) => ov.querySelector(`[data-mbtn="${i}"]`).addEventListener("click", () => b.onClick(ov, close)));
  document.addEventListener("keydown", onKey);
  host.appendChild(ov);
  const first = ov.querySelector("input,select,textarea"); if (first) first.focus();
  if (onMount) onMount(ov);
  return {el:ov, close};
}
function confirmDlg(msgHTML){
  return new Promise(res => {
    let settled = false;
    const settle = val => { if (!settled){ settled = true; res(val); } };
    openModal("Are you sure?", `<p style="margin:0">${msgHTML}</p>`,
      [{label:"Cancel", onClick(m, close){ close(); }},
       {label:"Yes, do it", primary:true, onClick(m, close){ settle(true); close(); }}],
      null, () => settle(false));
  });
}
function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  $("#toasts").appendChild(t);
  setTimeout(() => { t.style.transition = "opacity .3s"; t.style.opacity = "0"; }, 2300);
  setTimeout(() => t.remove(), 2700);
}

/* ============================ dispatch & boot ============================ */
function wireView(page, id, root){
  if (page === "dates") wireDates(root);
  else if (page === "venues"){ if (id === "compare") wireCompare(root); else if (id) wireVenue(id, root); else wireVenues(root); }
  else if (page === "tasks") wireTasks(root);
  else if (page === "settings") wireSettings(root);
  else wireHome(root);
}

(function boot(){
  const cfg = window.STEFANA && window.STEFANA.firebase;
  document.title = (window.STEFANA.appName || "Stefana") + " — wedding command center";
  if (cfg && cfg.apiKey){
    state.mode = "firebase";
    firebaseAdapter(cfg).then(a => { adapter = a; a.start(); })
      .catch(err => { console.error(err);
        state.mode = "demo"; adapter = demoAdapter(); adapter.start();
        toast("Firebase failed to load — running in demo mode. Check your config."); });
  } else {
    adapter = demoAdapter(); adapter.start();
  }
  scheduleRender();
})();
</script>
