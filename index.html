      ${isHelper() ? "" : `<div class="field"><label>Total budget (optional) — sets the cap on the Budget page</label><input id="s-cap" type="number" min="0" step="500" value="${esc(state.meta.budgetCap||"")}" placeholder="e.g. 30000"></div>`}
    </div>
  </div>
  <div class="sect">The four of you</div>
  <div class="card">
    <div class="note" style="margin-bottom:12px">Names appear on votes and tasks. Emails link each login to a person — use the exact address of each Firebase account.</div>
    <div class="stack">
    ${state.members.map(m => `
      <div class="fields2" style="align-items:end">
        <div class="field" style="margin:0"><label>${esc(m.role)} — name</label><input data-mname="${m.id}" value="${esc(m.name)}"></div>
        <div class="field" style="margin:0"><label>Login email</label><input data-memail="${m.id}" type="email" value="${esc((state.meta.memberEmails||{})[m.id]||"")}" placeholder="name@example.com"></div>
      </div>`).join("")}
    </div>
  </div>
  <div class="sect">Data & connection</div>
  <div class="grid cols-2">
    ${isHelper() ? "" : `<div class="card">
      <h3>Backup</h3>
      <p class="note" style="margin:10px 0 12px">Everything — venues, quotes, votes, tasks — as one JSON file. Keep one before big changes.</p>
      <button class="btn" data-act="export">Export a backup</button>
    </div>`}
    ${isHelper() ? "" : `<div class="card">
      <h3>Your master list — venues & guests</h3>
      <p class="note" style="margin:10px 0 12px">This build carries your ${SEED.venues.length} venues and ${SEED.guests.length} guest parties (${SEED.guests.reduce((n,g) => n + (+g.count||1), 0)} people) from the old planner and Notion. Adding is strictly additive — nothing already in your database, the graveyard included, is overwritten, un-deleted or duplicated.</p>
      ${(() => {
        const norm = s => (s || "").trim().toLowerCase();
        const gid = new Set(state.guests.map(g => g.id)), gname = new Set(state.guests.map(g => norm(g.name)));
        const vid = new Set(state.venues.filter(v => !v.sample).map(v => v.id));
        const vname = new Set(state.venues.filter(v => !v.sample).map(v => norm(v.name)));
        const mg = SEED.guests.filter(g => !gid.has(g.id) && !gname.has(norm(g.name))).length;
        const mv = SEED.venues.filter(v => !vid.has(v.id) && !vname.has(norm(v.name))).length;
        return `<p class="note" style="margin:0 0 12px">On the master list but not in your database right now: <b>${mg}</b> guest ${mg === 1 ? "party" : "parties"} · <b>${mv}</b> venue${mv === 1 ? "" : "s"}.</p>
      <div class="row">
        <button class="btn ${mg ? "primary" : ""}" data-act="import-guests" ${mg ? "" : "disabled"}>Add the missing guests</button>
        <button class="btn" data-act="import-venues" ${mv ? "" : "disabled"}>Add the missing venues</button>
      </div>`; })()}
    </div>
    <div class="card">
      <h3>Undo an accidental re-add</h3>
      <p class="note" style="margin:10px 0 12px">If an import ever brings back venues you\u2019d deleted in the past, this replays your activity history and re-buries every venue whose last recorded event was a deletion. They go to the graveyard \u2014 nothing is erased \u2014 so you can review them and restore any keeper.</p>
      <button class="btn" data-act="rebury">Re-bury my deleted venues</button>
    </div>`}
    <div class="card">
      <h3>Connection</h3>
      ${state.mode === "firebase"
        ? `<p class="note" style="margin-top:10px">Connected to Firebase project <b class="mono">${esc(cfg && cfg.projectId || "?")}</b>${state.user ? ` as <b>${esc(state.user.email)}</b>` : ""}. Everything syncs live for all four of you.</p>`
        : `<p class="note" style="margin-top:10px">Demo mode — nothing is saved. Follow <b>SETUP-GUIDE.md</b> to connect Firebase; it takes about 15 minutes.</p>`}
    </div>
  </div>`;
}
function wireSettings(root){
  const bind = (sel, fn) => { const el = $(sel, root); if (el) el.addEventListener("change", () => fn(el)); };
  bind("#s-wname",  el => { saveMeta({weddingName: el.value.trim() || "Stefana"}); toast("Saved"); });
  bind("#s-couple", el => { saveMeta({coupleNames: el.value.trim()}); toast("Saved"); });
  bind("#s-guests", el => { saveMeta({expectedGuests: Math.max(1, +el.value || 90)}); toast("Saved — per-guest costs updated"); });
  bind("#s-cap", el => { saveMeta({budgetCap: +el.value || 0}); toast("Saved — budget cap updated"); });
  $$("[data-mname]", root).forEach(inp => inp.addEventListener("change", () => {
    const m = memberById(inp.dataset.mname); if (!m) return;
    m.name = inp.value.trim() || m.role; saveDoc("members", m); toast("Saved"); }));
  $$("[data-memail]", root).forEach(inp => inp.addEventListener("change", () => {
    const map = {...(state.meta.memberEmails || {})};
    map[inp.dataset.memail] = inp.value.trim().toLowerCase();
    saveMeta({memberEmails: map}); toast("Saved"); }));
  const un = $('[data-act="unlock"]', root);
  if (un) un.addEventListener("click", async () => {
    if (await confirmDlg("Unlock the date? “Months before” deadlines go back to being estimates.")){
      saveMeta({lockedDateId:null}); logActivity("unlocked the date"); toast("Date unlocked"); }});
  const impG = $('[data-act="import-guests"]', root);
  if (impG) impG.addEventListener("click", async () => {
    const norm = s => (s || "").trim().toLowerCase();
    const oldSampleNames = {g1:"Eleni P.", g2:"Nikos K.", g3:"Marina T.", g4:"Petros D.", g5:"Sofia L.", g6:"Giorgos M."};
    const dropG = state.guests.filter(g => oldSampleNames[g.id] && g.name === oldSampleNames[g.id]);
    const dropped = new Set(dropG.map(g => g.id));
    const haveId = new Set(), haveName = new Set();
    state.guests.forEach(g => { if (!dropped.has(g.id)){ haveId.add(g.id); haveName.add(norm(g.name)); } });
    const missing = SEED.guests.filter(g => !haveId.has(g.id) && !haveName.has(norm(g.name)));
    if (!missing.length) return toast("Every guest on the master list is already in");
    if (!await confirmDlg(`Add <b>${missing.length} guest ${missing.length === 1 ? "party" : "parties"}</b> from the master list? Everyone already in the database stays exactly as they are.`)) return;
    dropG.forEach(g => dropDoc("guests", g.id));
    missing.forEach(g => saveDoc("guests", g));
    logActivity(`added ${missing.length} guest ${missing.length === 1 ? "party" : "parties"} from the master list`);
    toast(`Added ${missing.length} guest ${missing.length === 1 ? "party" : "parties"}`);
  });
  const impV = $('[data-act="import-venues"]', root);
  if (impV) impV.addEventListener("click", async () => {
    const norm = s => (s || "").trim().toLowerCase();
    const haveId = new Set(state.venues.filter(v => !v.sample).map(v => v.id));
    const haveName = new Set(state.venues.filter(v => !v.sample).map(v => norm(v.name)));
    const missing = SEED.venues.filter(v => !haveId.has(v.id) && !haveName.has(norm(v.name)));
    if (!missing.length) return toast("Every venue on the master list is already in");
    const preview = missing.slice(0, 6).map(v => esc(v.name)).join(", ") + (missing.length > 6 ? ` +${missing.length - 6} more` : "");
    if (!await confirmDlg(`Add <b>${missing.length} venue${missing.length === 1 ? "" : "s"}</b> from the master list?<br><span class="small" style="color:var(--faint)">${preview}</span><br>Note: this can bring back venues you once deleted <i>forever</i>. Living and graveyarded venues are left untouched; untouched sample venues are cleared.`)) return;
    state.venues.filter(v => v.sample).forEach(v => dropDoc("venues", v.id));
    missing.forEach(v => saveDoc("venues", v));
    logActivity(`added ${missing.length} venue${missing.length === 1 ? "" : "s"} from the master list`);
    toast(`Added ${missing.length} venue${missing.length === 1 ? "" : "s"}`);
  });
  const rb = $('[data-act="rebury"]', root);
  if (rb) rb.addEventListener("click", async () => {
    rb.disabled = true;
    let evts = [];
    try { evts = await (adapter.fetchActivity ? adapter.fetchActivity() : Promise.resolve([])); }
    catch(e){ rb.disabled = false; return toast("Could not read the activity history: " + (e.code || e.message)); }
    rb.disabled = false;
    const norm = s => (s || "").trim().toLowerCase();
    const PATS = [
      [/^deleted venue \u201c(.+)\u201d$/, true],
      [/^moved \u201c(.+)\u201d to the graveyard$/, true],
      [/^deleted \u201c(.+)\u201d for good$/, true],
      [/^brought \u201c(.+)\u201d back from the graveyard$/, false],
      [/^added venue \u201c(.+)\u201d$/, false],
      [/^updated \u201c(.+)\u201d$/, false]
    ];
    const last = new Map();
    evts.sort((a, b) => (a.ts||0) - (b.ts||0)).forEach(e => {
      for (const [rx, dead] of PATS){ const m = rx.exec(e.text || ""); if (m){ last.set(norm(m[1]), {dead, ts: e.ts}); break; } }
    });
    const targets = state.venues.filter(v => !v.deleted && !v.sample && last.get(norm(v.name)) && last.get(norm(v.name)).dead);
    if (!targets.length) return toast("Nothing to re-bury \u2014 no living venue has a deletion as its last recorded event");
    const names = targets.map(v => esc(v.name)).join(", ");
    if (!await confirmDlg(`Move <b>${targets.length} venue${targets.length === 1 ? "" : "s"}</b> back to the graveyard?<br><div class="small" style="color:var(--faint);max-height:130px;overflow:auto;margin-top:6px">${names}</div>`)) return;
    targets.forEach(v => saveDoc("venues", {...v, deleted: true, deletedAt: (last.get(norm(v.name)).ts || Date.now())}));
    logActivity(`re-buried ${targets.length} venue${targets.length === 1 ? "" : "s"} from the activity history`);
    toast(`${targets.length} venue${targets.length === 1 ? "" : "s"} laid back to rest \u2014 review them under the Graveyard chip`);
  });
  const ex = $('[data-act="export"]', root);
  if (ex) ex.addEventListener("click", () => {
    const blob = new Blob([JSON.stringify({members:state.members, dates:state.dates, venues:state.venues, vendors:state.vendors, tasks:state.tasks, guests:state.guests, tables:state.tables, runsheet:state.runsheet, budget:state.budget, board:state.board, publicInfo:state.publicInfo, meta:state.meta, activity:state.activity}, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `stefana-backup-${todayISO()}.json`;
    a.click(); URL.revokeObjectURL(a.href); toast("Backup downloaded");
  });
}

/* ============================ modal, confirm, toast ============================ */
function openModal(title, body, buttons = [], onMount, onClose){
  const host = $("#modal-root");
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="modal" role="dialog" aria-modal="true">
    <header><h3>${title}</h3><button class="xbtn" data-close aria-label="Close">${I.x}</button></header>
    <div class="mbody">${body}</div>
    ${buttons.length ? `<footer>${buttons.map((b,i) =>
      `<button class="btn ${b.primary?"primary":b.danger?"danger":""}" data-mbtn="${i}">${esc(b.label)}</button>`).join("")}</footer>` : ""}
  </div>`;
  let closed = false;
  const close = () => { if (closed) return; closed = true;
    ov.remove(); document.removeEventListener("keydown", onKey); if (onClose) onClose(); };
  const onKey = e => { if (e.key === "Escape") close(); };
  ov.addEventListener("click", e => { if (e.target === ov) close(); });
  ov.querySelector("[data-close]").addEventListener("click", close);
  buttons.forEach((b,i) => ov.querySelector(`[data-mbtn="${i}"]`).addEventListener("click", () => b.onClick(ov, close)));
  document.addEventListener("keydown", onKey);
  host.appendChild(ov);
  const first = ov.querySelector("input,select,textarea"); if (first) first.focus();
  if (onMount) onMount(ov);
  return {el:ov, close};
}
function confirmDlg(msgHTML){
  return new Promise(res => {
    let settled = false;
    const settle = val => { if (!settled){ settled = true; res(val); } };
    openModal("Are you sure?", `<p style="margin:0">${msgHTML}</p>`,
      [{label:"Cancel", onClick(m, close){ close(); }},
       {label:"Yes, do it", primary:true, onClick(m, close){ settle(true); close(); }}],
      null, () => settle(false));
  });
}
function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  $("#toasts").appendChild(t);
  setTimeout(() => { t.style.transition = "opacity .3s"; t.style.opacity = "0"; }, 2300);
  setTimeout(() => t.remove(), 2700);
}

/* ============================ dispatch & boot ============================ */
function wireView(page, id, root){
  if (page === "dates") wireDates(root);
  else if (page === "venues"){ if (id === "compare") wireCompare(root); else if (id) wireVenue(id, root); else wireVenues(root); }
  else if (page === "vendors"){ if (id) wireVendor(id, root); else wireVendors(root); }
  else if (page === "guests"){ if (id === "seating") wireSeating(root); else if (id === "page") wireGuestPage(root); else wireGuests(root); }
  else if (page === "budget") wireBudget(root);
  else if (page === "board") wireBoard(root);
  else if (page === "tasks"){ if (id === "day") wireDay(root); else wireTasks(root); }
  else if (page === "settings") wireSettings(root);
  else wireHome(root);
  $$("[data-subtab]", root).forEach(b => b.addEventListener("click", () => go("#/" + b.dataset.subtab)));
}

(function boot(){
  const cfg = window.STEFANA && window.STEFANA.firebase;
  document.title = (window.STEFANA.appName || "Stefana") + " — wedding command center";
  if (cfg && cfg.apiKey){
    state.mode = "firebase";
    firebaseAdapter(cfg).then(a => { adapter = a; a.start(); })
      .catch(err => { console.error(err);
        state.mode = "demo"; adapter = demoAdapter(); adapter.start();
        toast("Firebase failed to load — running in demo mode. Check your config."); });
  } else {
    adapter = demoAdapter(); adapter.start();
  }
  scheduleRender();
})();
</script>
