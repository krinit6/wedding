<style>
:root{
  --display:'Marcellus',serif; --body:'Instrument Sans',system-ui,sans-serif;
}
[data-theme="winter"]{
  --bg:#152A21; --card:#1D362B; --card2:#264337;
  --wash1:rgba(223,174,84,.08); --wash2:rgba(156,44,67,.06);
  --ink:#F3EDDD; --head:#E8C377; --sub:#B9C4B4; --faint:#8FA093;
  --line:rgba(243,237,221,.12); --frame:rgba(232,195,119,.4);
  --accent:#DFAE54; --accent-ink:#EFCB84;
  --bulb-a:#EFC26A; --bulb-b:#E17A8A; --bulb-c:#8FCEA9; --wire:#93aa8c;
  --glow:rgba(233,190,100,.35); --shadow:5,14,10;
}
[data-theme="spring"]{
  --bg:#FCFBF7; --card:#FFFFFF; --card2:#F4F2EA;
  --wash1:rgba(240,154,115,.12); --wash2:rgba(127,160,181,.12);
  --ink:#33322C; --head:#A8501F; --sub:#6F7062; --faint:#9A9A8A;
  --line:#E9E7DD; --frame:#E3C9A0;
  --accent:#E2A445; --accent-ink:#96650F;
  --bulb-a:#ECB25B; --bulb-b:#EE9A70; --bulb-c:#8CA7CE; --wire:#8A7147;
  --glow:rgba(226,164,69,.4); --shadow:70,60,35;
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{margin:0;color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;
  background:radial-gradient(720px 340px at 15% -4%,var(--wash1),transparent 70%),radial-gradient(720px 340px at 85% -4%,var(--wash2),transparent 70%),var(--bg)}
.wrap{max-width:680px;margin:0 auto;padding:0 20px 70px}
.garland{display:block;width:100%;height:46px;margin-bottom:10px}
.garland .wire{stroke:var(--wire);stroke-width:1.4;fill:none;opacity:.55}
.garland .pend{stroke:var(--wire);stroke-width:1;opacity:.5}
.bulb{filter:drop-shadow(0 0 2.5px currentColor) drop-shadow(0 0 7px currentColor);opacity:.95}
.bulb.a{color:var(--bulb-a)} .bulb.b{color:var(--bulb-b)} .bulb.c{color:var(--bulb-c)}
@media (prefers-reduced-motion:no-preference){
  .bulb{animation:tw 3s ease-in-out infinite;animation-delay:var(--d,0s)}
  @keyframes tw{0%,100%{opacity:.4;filter:drop-shadow(0 0 1.5px currentColor)}50%{opacity:1;filter:drop-shadow(0 0 3px currentColor) drop-shadow(0 0 9px currentColor)}}
}
.hero{position:relative;border:1px solid var(--frame);border-radius:18px;padding:52px 26px 44px;margin-top:22px;text-align:center;
  background:linear-gradient(180deg,var(--card) 0%,var(--card2) 150%);box-shadow:0 1px 2px rgba(var(--shadow),.16),0 16px 46px rgba(var(--shadow),.16)}
.hero::before{content:"";position:absolute;inset:9px;border:1px solid var(--frame);border-radius:12px;pointer-events:none;opacity:.7}
.eyebrow{font-size:11.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--sub)}
h1{font-family:var(--display);font-weight:400;font-size:clamp(34px,8.5vw,52px);line-height:1.12;margin:14px 0 6px;color:var(--head)}
.dateline{font-family:var(--display);font-size:19px;color:var(--accent-ink);letter-spacing:.04em}
.tagline{color:var(--sub);margin-top:12px;font-size:15.5px}
.flameline{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:22px auto 0;position:relative}
.flameline::after{content:"";position:absolute;left:50%;top:-3.5px;width:7px;height:7px;transform:translateX(-50%);border-radius:50%;background:var(--accent);box-shadow:0 0 12px 4px var(--glow)}
section{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 22px;margin-top:16px;
  box-shadow:0 1px 2px rgba(var(--shadow),.12),0 10px 28px rgba(var(--shadow),.10)}
h2{font-family:var(--display);font-weight:400;font-size:22px;margin:0 0 8px;color:var(--head)}
section p{margin:.35em 0;white-space:pre-line;color:var(--ink)}
.sched h2{margin-bottom:14px}
.day{margin:0 0 18px}
.day:last-child{margin-bottom:0}
.day .dname{font-family:var(--display);font-size:17px;color:var(--accent-ink);margin:0 0 8px;letter-spacing:.02em}
.slot{display:flex;gap:14px;padding:7px 0;border-top:1px solid var(--line)}
.slot:first-of-type{border-top:0}
.slot .t{font-variant-numeric:tabular-nums;font-weight:600;color:var(--head);min-width:56px}
.slot .w{color:var(--ink)}
footer{text-align:center;color:var(--sub);font-size:14px;margin-top:34px}
footer .contact{white-space:pre-line}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 9px 3px var(--glow);margin:18px auto 12px}
.center{min-height:70dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--sub)}
.center .serif{font-family:var(--display);font-size:26px;color:var(--head);margin-bottom:8px}
a{color:var(--accent-ink)}

<body data-theme="spring">
<div class="wrap">
  <div id="page" class="center"><div class="serif">Lighting the candles…</div></div>
</div>

<script type="module">
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function garlandSVG(){
  const W = 1440, swags = 6, sw = W / swags, top = 6, sag = 26;
  let wirePath = `M0 ${top}`, bulbs = "", k = 0;
  for (let i = 0; i < swags; i++){
    const x0 = i * sw, x1 = (i + 1) * sw, cx = x0 + sw / 2;
    wirePath += ` Q ${cx} ${top + sag * 2} ${x1} ${top}`;
    for (const t of [.22, .5, .78]){
      const bx = x0 + sw * t;
      const u = 2 * t * (1 - t);
      const by = top + 2 * sag * u * 2 * (1 - Math.abs(.5 - t));
      const drop = 5 + (k % 3) * 2.4;
      bulbs += `<line class="pend" x1="${bx}" y1="${by.toFixed(1)}" x2="${bx}" y2="${(by + drop).toFixed(1)}"/>
        <circle class="bulb ${["a","b","c"][k % 3]}" style="--d:${(k * .37 % 2.4).toFixed(2)}s" cx="${bx}" cy="${(by + drop + 2.6).toFixed(1)}" r="2.6" fill="currentColor"/>`;
      k++;
    }
  }
  return `<svg class="garland" viewBox="0 0 ${W} 46" preserveAspectRatio="none" aria-hidden="true">
    <path class="wire" d="${wirePath}"/>${bulbs}</svg>`;
}

function renderInfo(p){
  document.body.dataset.theme = p.theme === "winter" ? "winter" : "spring";
  if (p.names) document.title = p.names;
  document.getElementById("page").outerHTML = `
    ${garlandSVG()}
    <div class="hero">
      <div class="eyebrow">Together with our families</div>
      <h1>${esc(p.names || "We're getting married")}</h1>
      ${p.dateLine ? `<div class="dateline">${esc(p.dateLine)}</div>` : ""}
      ${p.tagline ? `<div class="tagline">${esc(p.tagline)}</div>` : ""}
      <div class="flameline"></div>
    </div>
    ${(p.sections || []).filter(s => s.title || s.body).map(s => `
      <section>${s.title ? `<h2>${esc(s.title)}</h2>` : ""}<p>${esc(s.body || "")}</p></section>`).join("")}
    ${(p.schedule && p.schedule.length) ? `
      <section class="sched">
        <h2>The weekend</h2>
        ${p.schedule.map(day => `
          <div class="day">
            <div class="dname">${esc(day.label)}</div>
            ${(day.items || []).map(it => `
              <div class="slot"><span class="t">${esc(it.time || "")}</span><span class="w">${esc(it.title)}</span></div>`).join("")}
          </div>`).join("")}
      </section>` : ""}
    <footer>
      <span class="dot"></span>
      ${p.contact ? `<div class="contact">${esc(p.contact)}</div>` : ""}
      <div style="margin-top:10px;opacity:.75">We can't wait to celebrate with you.</div>
    </footer>`;
}

function renderEmpty(msg){
  document.getElementById("page").innerHTML =
    `<div class="serif">Nothing here yet</div><div>${esc(msg)}</div>`;
}

(async () => {
  const cfg = (window.STEFANA || {}).firebase;
  if (!cfg) return renderEmpty("This page hasn't been connected yet — the couple still has one small step to finish.");
  try {
    const [{initializeApp}, fs] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js")
    ]);
    const db = fs.getFirestore(initializeApp(cfg));
    const snap = await fs.getDoc(fs.doc(db, "public", "info"));
    if (!snap.exists() || !snap.data().published)
      return renderEmpty("The couple is still writing this page. Check back soon.");
    renderInfo(snap.data());
  } catch (e){
    renderEmpty("The page couldn't load just now — try again in a moment.");
  }
})();
</script>
</body>
</html>
